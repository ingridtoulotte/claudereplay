  .thinking .ic{background:#202231;color:var(--think)}

  .result.err .card{border-color:#3a2630;background:#241a1f}

.slice(0, 12);\n}\n\n/** JSON.stringify with deterministically sorted object keys at every depth. */\nexport function stableStringify(value) {\n  if (value === null || typeof value !== \"object\") return JSON.stringify(value);\n  if (Array.isArray(value)) return \"[\" + value.map(stableStringify).join(\",\") + \"]\";\n  const keys = Object.keys(value).sort();\n  return (\n    \"{\" +\n    keys.map((k) => JSON.stringify(k) + \":\" + stableStringify(value[k])).join(\",\") +\n    \"}\"\n  );\n}\n"},"ctx":38585,"i":14},{"kind":"result","ts":"2026-06-13T08:32:17.821Z","tid":"toolu_0193gioWZTAKS4nL2mEFNgzf","err":false,"img":false,"bytes":135,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\util\\hash.mjs (file state is current in your context \u2014 no need to Read it back)","i":15},{"kind":"text","ts":"2026-06-13T08:32:28.870Z","text":"Now the scorer \u2014 aggregates trials into pass-rate+CI, token/latency/cost stats, and the significance verdict.","i":16},{"kind":"tool","ts":"2026-06-13T08:32:50.700Z","tool":"Write","tk":"write","tid":"toolu_01VSsyczRbQu7jH3Vf4ojPtf","sum":"D:\\assets\\claudebench\\src\\engine\\scorer.mjs","inp":{"file_path":"D:\\assets\\claudebench\\src\\engine\\scorer.mjs","content":"// scorer.mjs \u2014 turns raw trial records into auditable scores.\n//\n// Design stance (this is the part people will argue about, so it is explicit):\n//\n//   1. The HEADLINE score is pass rate, nothing else. pass rate is objective\n//      (tests either pass or they don't) and needs no opinion to compute.\n//      Score = round(100 * passRate). No magic blend of latency/tokens hidden\n//      inside it \u2014 blending is exactly where benchmarks lose trust.\n//\n//   2. Tokens, latency and cost are reported ALONGSIDE the score as first-class\n//      columns, never folded into it. A faster cheaper config that fails more\n//      tasks is not \"better\"; the reader decides the trade-off, not us.\n//\n//   3. An OPTIONAL composite (\"efficiency-adjusted score\") exists for people\n//      who want one number, but its weights are passed in and printed, so it is\n//      never a black box.\n\nimport { mean, stddev, percentile, wilson, twoProportionTest, intervalsOverlap } from \"./stats.mjs\";\n\n// Token prices (USD per 1M tokens). Update as Anthropic pricing changes; the\n// active table is recorded in every report so old runs stay interpretable.\nexport const PRICING = {\n  \"claude-opus-4-8\": { in: 15, out: 75 },\n  \"claude-sonnet-4-6\": { in: 3, out: 15 },\n  \"claude-haiku-4-5\": { in: 1, out: 5 },\n  default: { in: 3, out: 15 },\n};\n\nfunction costUsd(model, tokensIn, tokensOut) {\n  const p = PRICING[model] || PRICING.default;\n  return (tokensIn / 1e6) * p.in + (tokensOut / 1e6) * p.out;\n}\n\n/**\n * Score one config from its trial records.\n * @param {string} configId\n * @param {Array<{passed:boolean, tokensIn:number, tokensOut:number, latencyMs:number}>} trials\n * @param {{model?:string, z?:number}} opts\n */\nexport function scoreConfig(configId, trials, opts = {}) {\n  const model = opts.model || \"default\";\n  const z = opts.z ?? 1.96;\n  const n = trials.length;\n  const successes = trials.filter((t) => t.passed).length;\n  const ci = wilson(successes, n, z);\n\n  const tokensTotal = trials.map((t) => t.tokensIn\u2026"},"ctx":39087,"i":17},{"kind":"result","ts":"2026-06-13T08:32:50.715Z","tid":"toolu_01VSsyczRbQu7jH3Vf4ojPtf","err":false,"img":false,"bytes":139,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\engine\\scorer.mjs (file state is current in your context \u2014 no need to Read it back)","i":18},{"kind":"text","ts":"2026-06-13T08:32:54.594Z","text":"Now report helpers \u2014 bars, sparklines, table primitives for the screenshot-worthy output.","i":19},{"kind":"tool","ts":"2026-06-13T08:33:09.440Z","tool":"Write","tk":"write","tid":"toolu_01PSQFBEES7JaC4r4vdcpHaW","sum":"D:\\assets\\claudebench\\src\\report\\table.mjs","inp":{"file_path":"D:\\assets\\claudebench\\src\\report\\table.mjs","content":"// table.mjs \u2014 terminal drawing primitives (boxes, bars, sparklines).\n// All zero-dep, all ANSI-width aware so colored cells still align.\nimport { c, rgb, visibleLen, pad } from \"../util/colors.mjs\";\n\nconst BOX = {\n  tl: \"\u256d\", tr: \"\u256e\", bl: \"\u2570\", br: \"\u256f\",\n  h: \"\u2500\", v: \"\u2502\", ml: \"\u251c\", mr: \"\u2524\", mt: \"\u252c\", mb: \"\u2534\", x: \"\u253c\",\n};\n\n/** A rounded box around pre-rendered lines, with an optional title tab. */\nexport function box(lines, { title = \"\", color = c.cyan } = {}) {\n  const width = Math.max(...lines.map(visibleLen), visibleLen(title) + 2, 10);\n  const out = [];\n  const top = title\n    ? color(BOX.tl + BOX.h + \" \") + c.bold(title) + \" \" +\n      color(BOX.h.repeat(Math.max(0, width - visibleLen(title) - 3)) + BOX.tr)\n    : color(BOX.tl + BOX.h.repeat(width + 2) + BOX.tr);\n  out.push(top);\n  for (const line of lines) {\n    out.push(color(BOX.v) + \" \" + pad(line, width) + \" \" + color(BOX.v));\n  }\n  out.push(color(BOX.bl + BOX.h.repeat(width + 2) + BOX.br));\n  return out.join(\"\\n\");\n}\n\n/** Horizontal bar, optionally with a faint confidence-interval whisker. */\nexport function bar(value, max, width = 24, { color, ci } = {}) {\n  const frac = max > 0 ? value / max : 0;\n  const filled = Math.round(frac * width);\n  const tone = color || gradient(frac);\n  let cells = [];\n  for (let i = 0; i < width; i++) {\n    if (i < filled) cells.push(tone(\"\u2588\"));\n    else cells.push(c.gray(\"\u2591\"));\n  }\n  if (ci && max > 0) {\n    const lo = Math.round((ci.lo / max) * width);\n    const hi = Math.min(width - 1, Math.round((ci.hi / max) * width));\n    if (cells[lo]) cells[lo] = c.white(\"\ufffdmisc\");\n    // mark CI bounds with brackets without breaking width\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }\n  return cells.join(\"\");\n}\n\n/** Unicode sparkline from a numeric series. */\nexport function sparkline(xs) {\n  if (xs.length === 0) return \"\";\n  const ticks = \"\u2581\u2582\u2583\u2584\u2585\u2586\u2587\u2588\";\n  const min = Math.min(...xs);\n  const max = Math.max(...xs);\n  const span = max - min || 1;\n  return xs\n    .\u2026"},"ctx":41546,"i":20},{"kind":"result","ts":"2026-06-13T08:33:09.477Z","tid":"toolu_01PSQFBEES7JaC4r4vdcpHaW","err":false,"img":false,"bytes":138,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\report\\table.mjs (file state is current in your context \u2014 no need to Read it back)","i":21},{"kind":"text","ts":"2026-06-13T08:33:12.719Z","text":"Typo in `bar()` CI logic \u2014 fix it.","i":22},{"kind":"tool","ts":"2026-06-13T08:33:15.893Z","tool":"Edit","tk":"edit","tid":"toolu_01Uoid6Hec3mbo34t2FXc8bU","sum":"D:\\assets\\claudebench\\src\\report\\table.mjs","inp":{"replace_all":false,"file_path":"D:\\assets\\claudebench\\src\\report\\table.mjs","old_string":"  if (ci && max > 0) {\n    const lo = Math.round((ci.lo / max) * width);\n    const hi = Math.min(width - 1, Math.round((ci.hi / max) * width));\n    if (cells[lo]) cells[lo] = c.white(\"\ufffdmisc\");\n    // mark CI bounds with brackets without breaking width\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }","new_string":"  if (ci && max > 0) {\n    // Overlay the confidence interval as bracket markers, keeping bar width fixed.\n    const lo = Math.max(0, Math.min(width - 1, Math.round((ci.lo / max) * width)));\n    const hi = Math.max(0, Math.min(width - 1, Math.round((ci.hi / max) * width)));\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }"},"ctx":43169,"i":23},{"kind":"result","ts":"2026-06-13T08:33:15.926Z","tid":"toolu_01Uoid6Hec3mbo34t2FXc8bU","err":false,"img":false,"bytes":148,"trunc":false,"out":"The file D:\\assets\\claudebench\\src\\report\\table.mjs has been updated successfully. (file state is current d.length}`;\n  lines.push(\"\", header, \"\");\n\n  // \u2500\u2500 results table \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const rows = [\n    [\n      c.gray(\"  \"),\n      c.bold(c.gray(\"CONFIG\")),\n      c.bold(c.gray(\"SCORE\")),\n      c.bold(c.gray(\"PASS RATE  (95% CI)\")),\n      c.bold(c.gray(\"TOKENS\")),\n      c.bold(c.gray(\"LATENCY\")),\n      c.bold(c.gray(\"COST\")),\n    ],\n  ];\n  ranked.forEach((s, i) => {\n    const medal = i === 0 ? c.yellow(\"\u25cf\") : c.gray(\"\u25cb\");\n    const tone = gradient(s.passRate);\n    const ciStr = `${fmtPct(s.passRate)} ${c.gray(fmtPct(s.ci.lo) + \"\u2013\" + fmtPct(s.ci.hi))}`;\n    rows.push([\n      medal,\n      i === 0 ? c.bold(s.configId) : s.configId,\n      tone(c.bold(String(s.score).padStart(3))),\n      bar(s.passRate, 1, 14, { ci: s.ci }) + \" \" + ciStr,\n      fmtTokens(s.tokens.total),\n      fmtMs(s.latency\u2026"},"ctx":43774,"i":26},{"kind":"result","ts":"2026-06-13T08:33:47.697Z","tid":"toolu_01FWXPNhuhH56nC6fhwq2a6C","err":false,"img":false,"bytes":142,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\report\\scorecard.mjs (file state is current in your context \u2014 no need to Read it back)","i":27},{"kind":"text","ts":"2026-06-13T08:33:56.547Z","text":"Now the runner stack: adapter (shells to real `claude`), grader (test-based), runner (orchestrates live + replay).","i":28},{"kind":"tool","ts":"2026-06-13T08:34:07.012Z","tool":"Write","tk":"write","tid":"toolu_011aGMyrpnn9H8xaibhvfKmf","sum":"D:\\assets\\claudebench\\src\\adapters\\claude-code.mjs","inp":{"file_path":"D:\\assets\\claudebench\\src\\adapters\\claude-code.mjs","content":"// claude-code.mjs \u2014 adapter that drives the real Claude Code CLI headlessly.\n//\n// We invoke:   claude -p \"<prompt>\" --output-format json\n// and read back the structured result (text + token usage + duration). This is\n// the ONLY place that talks to a model, so swapping in another agent later (or\n// the Claude API directly) means writing one more file in this folder.\nimport { spawn } from \"node:child_process\";\n\n/**\n * Run one task attempt in a prepared workspace.\n * @param {object} task   { id, prompt }\n * @param {object} opts   { cwd, model, bin, timeoutMs }\n * @returns {Promise<{text:string, tokensIn:number, tokensOut:number, latencyMs:number, costUsd:number, raw:object}>}\n */\nexport async function runClaudeCode(task, opts = {}) {\n  const bin = opts.bin || process.env.CLAUDEBENCH_CLAUDE_BIN || \"claude\";\n  const args = [\"-p\", task.prompt, \"--output-format\", \"json\"];\n  if (opts.model) args.push(\"--model\", opts.model);\n\n  const start = Date.now();\n  const { stdout } = await exec(bin, args, { cwd: opts.cwd, timeoutMs: opts.timeoutMs ?? 600000 });\n  const latencyMs = Date.now() - start;\n\n  let raw = {};\n  try {\n    raw = JSON.parse(stdout);\n  } catch {\n    raw = { result: stdout };\n  }\n  // Claude Code's JSON output exposes usage under `usage`; fall back gracefully.\n  const usage = raw.usage || raw.message?.usage || {};\n  return {\n    text: raw.result ?? raw.text ?? \"\",\n    tokensIn: usage.input_tokens ?? 0,\n    tokensOut: usage.output_tokens ?? 0,\n    latencyMs: raw.duration_ms ?? latencyMs,\n    costUsd: raw.total_cost_usd ?? 0,\n    raw,\n  };\n}\n\nfunction exec(cmd, args, { cwd, timeoutMs }) {\n  return new Promise((resolve, reject) => {\n    const child = spawn(cmd, args, { cwd, shell: process.platform === \"win32\" });\n    let stdout = \"\";\n    let stderr = \"\";\n    const timer = setTimeout(() => {\n      child.kill(\"SIGKILL\");\n      reject(new Error(`adapter timeout after ${timeoutMs}ms`));\n    }, timeoutMs);\n    child.stdout.on(\"data\", (d) => (stdout += d));\n    child.std\u2026"},"ctx":46788,"i":29},{"kind":"result","ts":"2026-06-13T08:34:07.025Z","tid":"toolu_011aGMyrpnn9H8xaibhvfKmf","err":false,"img":false,"bytes":146,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\adapters\\claude-code.mjs (file state is current in your context \u2014 no need to Read it back)","i":30},{"kind":"tool","ts":"2026-06-13T08:34:16.960Z","tool":"Write","tk":"write","tid":"toolu_01QYNv8kfBykBwHznB6mkW5a","sum":"D:\\assets\\claudebench\\src\\engine\\grader.mjs","inp":{"file_path":"D:\\assets\\claudebench\\src\\engine\\grader.mjs","content":"// grader.mjs \u2014 objective, test-based grading. No LLM judges.\n//\n// A task passes iff its declared test command exits 0 in the workspace after\n// the agent has run. That is the entire definition. It is auditable (you can\n// run the same command), deterministic given the agent's output, and immune to\n// the \"LLM grades LLM\" circularity that quietly wrecks most eval setups.\nimport { spawn } from \"node:child_process\";\n\n/**\n * @param {object} task  { id, test: { cmd, cwd? } }\n * @param {object} opts  { cwd, timeoutMs }\n * @returns {Promise<{passed:boolean, code:number, stdout:string, stderr:string}>}\n */\nexport async function gradeTask(task, opts = {}) {\n  if (!task.test || !task.test.cmd) {\n    throw new Error(`task ${task.id} has no test.cmd \u2014 every task must be objectively gradable`);\n  }\n  const cwd = task.test.cwd ? `${opts.cwd}/${task.test.cwd}` : opts.cwd;\n  const result = await exec(task.test.cmd, { cwd, timeoutMs: opts.timeoutMs ?? 120000 });\n  return { passed: result.code === 0, ...result };\n}\n\nfunction exec(cmd, { cwd, timeoutMs }) {\n  return new Promise((resolve) => {\n    const child = spawn(cmd, { cwd, shell: true });\n    let stdout = \"\";\n    let stderr = \"\";\n    const timer = setTimeout(() => child.kill(\"SIGKILL\"), timeoutMs);\n    child.stdout.on(\"data\", (d) => (stdout += d));\n    child.stderr.on(\"data\", (d) => (stderr += d));\n    child.on(\"error\", (e) => {\n      clearTimeout(timer);\n      resolve({ code: 1, stdout, stderr: String(e) });\n    });\n    child.on(\"close\", (code) => {\n      clearTimeout(timer);\n      resolve({ code: code ?? 1, stdout, stderr });\n    });\n  });\n}\n"},"ctx":48425,"i":31},{"kind":"result","ts":"2026-06-13T08:34:16.990Z","tid":"toolu_01QYNv8kfBykBwHznB6mkW5a","err":false,"img":false,"bytes":139,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\engine\\grader.mjs (file state is current in your context \u2014 no need to Read it back)","i":32},{"kind":"tool","ts":"2026-06-13T08:34:40.195Z","tool":"Write","tk":"write","tid":"toolu_01XAYfxKXbw8nf9fz36r5dso","sum":"D:\\assets\\claudebench\\src\\engine\\runner.mjs","inp":{"file_path":"D:\\assets\\claudebench\\src\\engine\\runner.mjs","content":"// runner.mjs \u2014 orchestrates a benchmark run and produces a reproducible artifact.\n//\n// Two execution modes share one output format (the run artifact), which is the\n// key to reproducibility:\n//\n//   live    actually run the agent on every (config \u00d7 task \u00d7 trial) and record\n//           the raw transcript + usage into the artifact.\n//   replay  reconstruct the exact same trial records from a saved artifact /\n//           fixture, so scoring is bit-for-bit reproducible with zero cost and\n//           no API key. The demo, the tests and CI all use replay.\nimport { mkdtemp, mkdir, writeFile, cp, readFile, rm } from \"node:fs/promises\";\nimport { tmpdir } from \"node:os\";\nimport { join } from \"node:path\";\nimport { runClaudeCode } from \"../adapters/claude-code.mjs\";\nimport { gradeTask } from \"./grader.mjs\";\nimport { shortHash, hashJson } from \"../util/hash.mjs\";\n\n/**\n * @param {object} suite  loaded suite: { id, configs:[{id,content,files?}], tasks:[{id,prompt,test,files?}] }\n * @param {object} opts   { mode:'live'|'replay', trials, model, fixture, onProgress }\n * @returns {Promise<object>} run artifact\n */\nexport async function runSuite(suite, opts = {}) {\n  const mode = opts.mode || \"replay\";\n  const trials = opts.trials ?? 20;\n  const model = opts.model || \"claude-opus-4-8\";\n  const runId = `run-${shortHash({ suite: suite.id, t: Date.now(), n: trials })}`;\n  const suiteHash = shortHash({\n    configs: suite.configs.map((c) => ({ id: c.id, content: c.content })),\n    tasks: suite.tasks.map((t) => ({ id: t.id, prompt: t.prompt, test: t.test })),\n  });\n\n  let records;\n  if (mode === \"replay\") {\n    records = await replay(suite, opts.fixture);\n  } else {\n    records = await live(suite, { trials, model, onProgress: opts.onProgress });\n  }\n\n  return {\n    runId,\n    suite: suite.id,\n    suiteHash,\n    model,\n    mode,\n    createdAt: new Date().toISOString(),\n    trialsPerConfig: countTrialsPerConfig(records),\n    records, // every (config,task,trial) outcome \u2014 the audit trail\n\u2026"},"ctx":49254,"i":33},{"kind":"result","ts":"2026-06-13T08:34:40.225Z","tid":"toolu_01XAYfxKXbw8nf9fz36r5dso","err":false,"img":false,"bytes":139,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\src\\engine\\runner.mjs (file state is current in your context \u2014 no need to Read it back)","i":34},{"kind":"text","ts":"2026-06-13T08:34:56.032Z","text":"Now the demo suite: two real CLAUDE.md variants + tasks, plus a seeded fixture generator so `compare` runs deterministically for anyone with zero cost/keys.","i":35},{"kind":"tool","ts":"2026-06-13T08:35:05.497Z","tool":"Write","tk":"write","tid":"toolu_01XQajAJwB8FujH5t9E95GTg","sum":"D:\\assets\\claudebench\\suites\\claude-md\\configs\\verbose.md","inp":{"file_path":"D:\\assets\\claudebench\\suites\\claude-md\\configs\\verbose.md","content":"# Project Instructions\n\n## About this project\nThis is a JavaScript project. We care a lot about code quality and we want to\nmake sure that everything is done to a very high standard at al \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ntest(\"wilson interval brackets the point estimate and stays in [0,1]\", () => {\n  const w = wilson(84, 100);\n  assert.ok(Math.abs(w.point - 0.84) < 1e-9);\n  assert.ok(w.lo > 0 && w.lo < 0.84);\n  assert.ok(w.hi > 0.84 && w.hi < 1);\n});\n\ntest(\"wilson handles the 100% edge without exceeding 1\", () => {\n  const w = wilson(20, 20);\n  assert.equal(w.point, 1);\n  assert.ok(w.hi <= 1);\n  assert.ok(w.lo < 1, \"lower bound must be < 1 even at a perfect score\");\n});\n\ntest(\"wilson handles the 0% edge without going negative\", () => {\n  const w = wilson(0, 20);\n  assert.equal(w.point, 0);\n  assert.ok(w.lo >= 0);\n  assert.ok(w.hi > 0, \"upper bound must be > 0 even at a zero score\");\n});\n\ntest(\"normalCdf matches known values\", () => {\n  assert.ok(Math.abs(normalCdf(0) - 0.5) < 1e-6);\n  assert.ok(Math.abs(normalCdf(1.96) - 0.975) < 1e-3);\n});\n\ntest(\"two-proportion test flags a clear difference and ignores a tie\", () => {\n  const big = twoProportionTest(50, 100, 80, 100);\n  assert.ok(big.p < 0.001, \"50% vs 80% over 100 trials should be significant\");\n  const tie = twoProportionTest(50, 100, 52, 100);\n  assert.ok(tie.p > 0.05, \"50% vs 52% should not be significant\");\n});\n\ntest(\"mean/stddev/percentile basics\", () => {\n  assert.equal(mean([2, 4, 6]), 4);\n  assert.ok(Math.abs(stddev([2, 4, 6]) - 2) < 1e-9);\n  assert.equal(percentile([1, 2, 3, 4], 50), 2.5);\n});\n\n// \u2500\u2500 scoring \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction trials(passRate, n, tokens = 10000) {\n  return Array.from({ length: n }, (_, i) => ({\n    passed: i < Math.round(passRate * n),\n    tokensIn: tokens * 0.8,\n    tokensOut: tokens * 0.2,\n    latencyMs: 8000,\n  }));\n}\n\ntest(\"score\u2026"},"ctx":72127,"i":81},{"kind":"result","ts":"2026-06-13T08:39:12.962Z","tid":"toolu_01FmQXm3zoB83mdzt7PFCBE8","err":false,"img":false,"bytes":138,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\test\\scorer.test.mjs (file state is current in your context \u2014 no need to Read it back)","i":82},{"kind":"tool","ts":"2026-06-13T08:39:15.444Z","tool":"PowerShell","tk":"exec","tid":"toolu_0157pNcFpRukDqyJ3ZRGdD2R","sum":"cd D:\\assets\\claudebench; node --test 2>&1 | Select-Object -Last 20","inp":{"command":"cd D:\\assets\\claudebench; node --test 2>&1 | Select-Object -Last 20","description":"Run unit tests"},"ctx":73892,"i":83},{"kind":"result","ts":"2026-06-13T08:40:01.295Z","tid":"toolu_0157pNcFpRukDqyJ3ZRGdD2R","err":true,"img":false,"bytes":756,"trunc":false,"out":"Exit code 1\n    [\r\n      1,\r\n  -   1,\r\n      2\r\n    ]\r\n  \r\n      at TestContext.<anonymous> (file:///D:/assets/claudebench/suites/claude-md/tasks/refactor-dedupe/dedupe.test.js:11:10)\r\n      at Test.runInAsyncScope (node:async_hooks:227:14)\r\n      at Test.run (node:internal/test_runner/test:1201:25)\r\n      at Test.processPendingSubtests (node:internal/test_runner/test:831:18)\r\n      at Test.postRun (node:internal/test_runner/test:1330:19)\r\n      at Test.run (node:internal/test_runner/test:1258:12)\r\n      at async startSubtestAfterBootstrap (node:internal/test_runner/harness:385:3) {\r\n    generatedMessage: true,\r\n    code: 'ERR_ASSERTION',\r\n    actual: [ 1, 2 ],\r\n    expected: [ 1, 1, 2 ],\r\n    operator: 'deepStrictEqual',\r\n    diff: 'simple'\r\n  }","i":84},{"kind":"text","ts":"2026-06-13T08:40:07.245Z","text":"The runner globs into the suite task tests (intentionally-failing starters). Scope to `test/` only.","i":85},{"kind":"tool","ts":"2026-06-13T08:40:07.858Z","tool":"PowerShell","tk":"exec","tid":"toolu_0 he same tasks under each setup, get a score with a\n**confidence interval**, and find out whether the difference is real or just noise.\n\n[![tests](https://img.shields.io/badge/tests-passing-3fb950)](#)\n[![node](https://img.shields.io/badge/node-%E2%89%A518-58a6ff)](#)\n[![license](https://img.shields.io/badge/license-MIT-blue)](#)\n[![deps](https://img.shields.io/badge/runtime%20deps-0-3fb950)](#)\n\n<\/div>\n\n---\n\n> *\"This CLAUDE.md is better.\"*\n> *\"This prompt saves tokens.\"*\n> *\"This memory setup works best.\"*\n>\n> Cool. **Show the ClaudeBench results.**\n\nThe Claude Code ecosystem runs on confident claims and zero evidence. ClaudeBench turns\n\"I think it's better\" into \"it's **+24pp** better, **p<0.001**, here's the run you can replay.\"\n\n---\n\n## 60-second demo \u2014 no API key needed\n\n```bash\nnpx claudebench demo\n```\n\n```\n\u2b21 ClaudeBench  \u00b7  suite claude-md  \u00b7  model claude-opus-4-8  \u00b7  trials 90\u00d72\n\n\u256d\u2500 RESULTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256e\n\u2502     CONFIG         SCORE  PASS RATE  (95% CI)         TOKENS  LATENCY     COST   \u2502\n\u2502 \u25cf   terse-rules       88  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2591] 88% 79%\u201393%    7.8k     7.7s  $0.2177   \u2502\n\u2502 \u25cb   verbose-rules     63  \u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2588\u2591]\u2591\u2591\u2591 63% 53%\u201373%   12.4k     9.0s  $0.3048   \u2502\n\u2570\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u250  can get variation even at temperature 0).\n- Floating-point non-associativity across hardware.\n\n**Consequence:** any benchmark that reports a single exact number (\"score: 84\") is either running\none trial (statistically meaningless) or hiding variance. ClaudeBench refuses to do either.\n\n## 2. The unit of measurement: pass rate\n\nFor a given config, we run every task `trials` times. Each (config, task, trial) yields one\n**Bernoulli outcome**: the task's test command exited 0 (pass) or it didn't (fail).\n\nA config's score is its overall pass rate across all trials:\n\n```\nscore = round(100 \u00d7 successes / n)        where n = tasks \u00d7 trials\n```\n\nNothing else is in the headline score. See \u00a76 for why.\n\n## 3. The interval: Wilson score, 95%\n\nA pass rate of 84/100 is not \"84%\". It's \"84%, give or take\". We quantify the give-or-take with a\n**Wilson score interval** rather than the textbook normal approximation `p \u00b1 z\u00b7\u221a(p(1\u2212p)/n)`.\n\nWhy Wilson:\n\n- The normal approximation produces nonsense at the edges \u2014 bounds below 0 or above 1 \u2014 and\n  benchmark results live at the edges (\"10/10 passed!\").\n- Wilson stays inside [0, 1] and behaves well for small `n`.\n- It's the interval used by mature A/B-testing tools, so it's defensible.\n\nImplementation: [`src/engine/stats.mjs \u2192 wilson()`](../src/engine/stats.mjs), unit-tested at the\n0%, 100% and middle cases.\n\n## 4. The verdict: two-proportion significance test\n\nComparing two configs, we ask the only question that matters: **is the difference real?**\n\n- We run a **pooled two-proportion z-test** between the top config a\u2026"},"ctx":82826,"i":105},{"kind":"result","ts":"2026-06-13T08:42:41.662Z","tid":"toolu_011JRpz72EXzwo5dHSmgVLxV","err":false,"img":false,"bytes":137,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\docs\\METHODOLOGY.md (file state is current in your context \u2014 no need to Read it back)","i":106},{"kind":"tool","ts":"2026-06-13T08:43:04.716Z","tool":"Write","tk":"write","tid":"toolu_01Sem621sVuFe9HoWireDKhF","sum":"D:\\assets\\claudebench\\docs\\ARCHITECTURE.md","inp":{"file_path":"D:\\assets\\claudebench\\docs\\ARCHITECTURE.md","content":"# ClaudeBench Architecture\n\nZero runtime dependencies, pure Node ESM, no build step. The design goal is that a skeptic can read\nthe whole thing in an afternoon.\n\n## Module map\n\n```\nbin/claudebench.mjs        thin entrypoint \u2192 src/cli.mjs\nsrc/\n  cli.mjs                  arg parsing + command dispatch (demo/compare/run/replay/report/list)\n  index.mjs                public library API (import { runSuite, compare } from \"claudebench\")\n  engine/\n    suite.mjs              load + resolve suite.json (inline config contents, resolve task dirs)\n    runner.mjs             orchestrate live | replay \u2192 produce a run artifact\n    grader.mjs             run a task's test.cmd, pass = exit 0  (NO llm judge)\n    scorer.mjs             trials \u2192 pass rate + CI + token/latency/cost stats + verdict\n    stats.mjs              wilson(), twoProportionTest(), mean/stddev/percentile  (the trust core)\n  adapters/\n    claude-code.mjs        spawn `claude -p --output-format json`; parse usage  (only model contact)\n  report/\n    scorecard.mjs          the terminal scorecard (the screenshot)\n    table.mjs              ANSI-aware box/bar/sparkline/columns primitives\n    svg.mjs                self-contained SVG export for READMEs\n  util/\n    colors.mjs             hand-rolled ANSI, respects NO_COLOR / non-TTY\n    hash.mjs               stable-stringify + sha256 for reproducibility receipts\nsuites/<id>/               built-in benchmark suites (suite.json + configs/ + tasks/)\nfixtures/<id>.json         recorded trials so demos run free + offline + deterministic\nscripts/gen-fixture.mjs    dev-only seeded fixture generator (not shipped at runtime)\ntest/                      unit tests for stats + scoring\n```\n\n## Data flow\n\n```\nloadSuite(suite.json)\n      \u2502   { configs:[{id,content}], tasks:[{id,prompt,test,fixtureDir}] }\n      \u25bc\nrunSuite(suite, {mode})\n      \u251c\u2500 live:   for config\u00d7task\u00d7trial \u2192 prepareWorkspace \u2192 runClaudeCode \u2192 gradeTask \u2192 record\n      \u2514\u2500 replay: load fixture/artifact \u2192 validate against\u2026"},"ctx":85064,"i":107},{"kind":"result","ts":"2026-06-13T08:43:04.746Z","tid":"toolu_01Sem621sVuFe9HoWireDKhF","err":false,"img":false,"bytes":138,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\docs\\ARCHITECTURE.md (file state is current in your context \u2014 no need to Read it back)","i":108},{"kind":"tool","ts":"2026-06-13T08:43:09.832Z","tool":"Write","tk":"write","tid":"toolu_01B7Pp7ZxbtiGfj8HT8w8xsc","sum":"D:\\assets\\claudebench\\.github\\workflows\\ci.yml","inp":{"file_path":"D:\\assets\\claudebench\\.github\\workflows\\ci.yml","content":"name: ci\n\non:\n  push:\n    branches: [main]\n  pull_request:\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    strategy:\n      matrix:\n        node: [18, 20, 22]\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: ${{ matrix.node }}\n      - name: Unit tests\n        run: npm test\n      - name: Fixture is up to date\n        run: |\n          node scripts/gen-fixture.mjs\n          git diff --exit-code fixtures/claude-md.json\n      - name: Demo runs (replay, free, offline)\n        run: node bin/claudebench.mjs demo\n"},"ctx":86759,"i":109},{"kind":"result","ts":"2026-06-13T08:43:09.859Z","tid":"toolu_01B7Pp7ZxbtiGfj8HT8w8xsc","err":false,"img":false,"bytes":142,"trunc":false,"out":"File created successfully at: D:\\assets\\claudebench\\.github\\workflows\\ci.yml (file state is current in your context \u2014 no need to Read it back)","i":110},{"kind":"tool","ts":"2026-06-13T08:43:13.502Z","tool":"Write","tk":"write","tid":"toolu_013Ta4ARGesSximHGfhiB -1 / Bessel's correction). */\nexport function stddev(xs) {\n  if (xs.length < 2) return 0;\n  const m = mean(xs);\n  const variance = xs.reduce((a, b) => a + (b - m) ** 2, 0) / (xs.length - 1);\n  return Math.sqrt(variance);\n}\n\n/** Linear-interpolated percentile (p in [0,100]). */\nexport function percentile(xs, p) {\n  if (xs.length === 0) return 0;\n  const sorted = [...xs].sort((a, b) => a - b);\n  if (sorted.length === 1) return sorted[0];\n  const rank = (p / 100) * (sorted.length - 1);\n  const lo = Math.floor(rank);\n  const hi = Math.ceil(rank);\n  if (lo === hi) return sorted[lo];\n  return sorted[lo] + (sorted[hi] - sorted[lo]) * (rank - lo);\n}\n\n/**\n * Wilson score interval for a binomial proportion.\n *\n * Why Wilson and not the textbook normal approximation (p \u00b1 z\u00b7\u221a(p(1-p)/n))?\n * The normal approximation breaks badly for the small n and extreme p (0% /\n * 100% pass rates) that benchmark runs routinely produce \u2014 it can even give\n * bounds outside [0,1]. Wilson stays sensible at the edges, which is exactly\n * where benchmark debates live (\"it passed 10/10!\"). This is the same interval\n * used by reputable A/B testing tools.\n *\n * @param {number} successes  number of passing trials\n * @param {number} n          total trials\n * @param {number} z          z for the confidence level (1.96 = 95%)\n * @returns {{point:number, lo:number, hi:number}} proportions in [0,1]\n */\nexport function wilson(successes, n, z = 1.96) {\n  if (n === 0) return { point: 0, lo: 0, hi: 0 };\n  const p = successes / n;\n  const z2 = z * z;\n  const denom = 1 + z2 / n;\n  const center = (p + z2 / (2 * n)) / denom;\n  const margin =\n    (z * Math.sqrt((p * (1 - p)) / n + z2 / (4 * n * n))) / denom;\n  return {\n    point: p,\n    lo: Math.max(0, center - margin),\n    hi: Math.min(1, center + margin),\n  };\n}\n\n/**\n * Two-proportion z-test (pooled). Returns the z statistic and a two-sided\n * p-value. Used to answer the only question that matters in a comparison:\n * \"is B actually better than A, or is this noise?\"\n */\nexport function twoProportionTest(s1, n1, s2, n2) {\n  if (n1 === 0 || n2 === 0) return { z: 0, p: 1 };\n  const p1 = s1 / n1;\n  const p2 = s2 / n2;\n  const pPool = (s1 + s2) / (n1 + n2);\n  const se = Math.sqrt(pPool * (1 - pPool) * (1 / n1 + 1 / n2));\n  if (se === 0) return { z: 0, p: 1 };\n  const z = (p2 - p1) / se;\n  return { z, p: 2 * (1 - normalCdf(Math.abs(z))) };\n}\n\n/** Standard normal CDF via Abramowitz & Stegun 7.1.26 (max error ~7.5e-8). */\nexport function normalCdf(x) {\n  const t = 1 / (1 + 0.2316419 * Math.abs(x));\n  const d = 0.3989422804014327 * Math.exp(-(x * x) / 2);\n  const prob =\n    d *\n    t *\n    (0.319381530 +\n      t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));\n  return x > 0 ? 1 - prob : prob;\n}\n\n/** Do two confidence intervals overlap? Cheap visual significance heuristic. */\nexport function intervalsOverlap(a, b) {\n  return a.lo <= b.hi && b.lo <= a.hi;\n}\n","add":95,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\util\\colors.mjs","name":"colors.mjs","reads":0,"versions":[{"i":12,"ts":"2026-06-13T08:32:06.689Z","action":"write","lines":55,"after":"// colors.mjs \u2014 hand-rolled ANSI styling. Zero deps on purpose.\n//\n// Respects NO_COLOR (https://no-color.org) and non-TTY output so reports stay\n// clean when piped to files or CI logs.\n\nconst enabled =\n  !process.env.NO_COLOR &&\n  process.env.TERM !== \"dumb\" &&\n  (process.stdout.isTTY || process.env.FORCE_COLOR);\n\nconst wrap = (open, close) => (s) =>\n  enabled ? `\\x1b[${open}m${s}\\x1b[${close}m` : String(s);\n\nexport const c = {\n  enabled,\n  reset: \"\\x1b[0m\",\n  bold: wrap(1, 22),\n  dim: wrap(2, 22),\n  italic: wrap(3, 23),\n  underline: wrap(4, 24),\n  red: wrap(31, 39),\n  green: wrap(32, 39),\n  yellow: wrap(33, 39),\n  blue: wrap(34, 39),\n  magenta: wrap(35, 39),\n  cyan: wrap(36, 39),\n  gray: wrap(90, 39),\n  white: wrap(97, 39),\n  bgGreen: wrap(42, 49),\n  bgRed: wrap(41, 49),\n  bgBlue: wrap(44, 49),\n};\n\n/** Truecolor foreground (24-bit). Falls back to plain when color disabled. */\nexport function rgb(r, g, b, s) {\n  return enabled ? `\\x1b[38;2;${r};${g};${b}m${s}\\x1b[39m` : String(s);\n}\n\n/** Visible length ignoring ANSI escape codes \u2014 needed for alignment. */\nexport function visibleLen(s) {\n  return s.replace(/\\x1b\\[[0-9;]*m/g, \"\").length;\n}\n\n/** Pad a possibly-colored string to a visible width. */\nexport function pad(s, width, align = \"left\") {\n  const len = visibleLen(s);\n  const gap = Math.max(0, width - len);\n  if (align === \"right\") return \" \".repeat(gap) + s;\n  if (align === \"center\") {\n    const l = Math.floor(gap / 2);\n    return \" \".repeat(l) + s + \" \".repeat(gap - l);\n  }\n  return s + \" \".repeat(gap);\n}\n","add":55,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\util\\hash.mjs","name":"hash.mjs","reads":0,"versions":[{"i":14,"ts":"2026-06-13T08:32:17.794Z","action":"write","lines":25,"after":"// hash.mjs \u2014 deterministic content hashing for reproducibility receipts.\nimport { createHash } from \"node:crypto\";\n\n/** SHA-256 hex of any JSON-serialisable value, with stable key ordering. */\nexport function hashJson(value) {\n  return createHash(\"sha256\").update(stableStringify(value)).digest(\"hex\");\n}\n\n/** Short 12-char hash, used in report footers (\"suite a1b2c3d4e5f6\"). */\nexport function shortHash(value) {\n  return hashJson(value).slice(0, 12);\n}\n\n/** JSON.stringify with deterministically sorted object keys at every depth. */\nexport function stableStringify(value) {\n  if (value === null || typeof value !== \"object\") return JSON.stringify(value);\n  if (Array.isArray(value)) return \"[\" + value.map(stableStringify).join(\",\") + \"]\";\n  const keys = Object.keys(value).sort();\n  return (\n    \"{\" +\n    keys.map((k) => JSON.stringify(k) + \":\" + stableStringify(value[k])).join(\",\") +\n    \"}\"\n  );\n}\n","add":25,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\engine\\scorer.mjs","name":"scorer.mjs","reads":0,"versions":[{"i":17,"ts":"2026-06-13T08:32:50.700Z","action":"write","lines":128,"after":"// scorer.mjs \u2014 turns raw trial records into auditable scores.\n//\n// Design stance (this is the part people will argue about, so it is explicit):\n//\n//   1. The HEADLINE score is pass rate, nothing else. pass rate is objective\n//      (tests either pass or they don't) and needs no opinion to compute.\n//      Score = round(100 * passRate). No magic blend of latency/tokens hidden\n//      inside it \u2014 blending is exactly where benchmarks lose trust.\n//\n//   2. Tokens, latency and cost are reported ALONGSIDE the score as first-class\n//      columns, never folded into it. A faster cheaper config that fails more\n//      tasks is not \"better\"; the reader decides the trade-off, not us.\n//\n//   3. An OPTIONAL composite (\"efficiency-adjusted score\") exists for people\n//      who want one number, but its weights are passed in and printed, so it is\n//      never a black box.\n\nimport { mean, stddev, percentile, wilson, twoProportionTest, intervalsOverlap } from \"./stats.mjs\";\n\n// Token prices (USD per 1M tokens). Update as Anthropic pricing changes; the\n// active table is recorded in every report so old runs stay interpretable.\nexport const PRICING = {\n  \"claude-opus-4-8\": { in: 15, out: 75 },\n  \"claude-sonnet-4-6\": { in: 3, out: 15 },\n  \"claude-haiku-4-5\": { in: 1, out: 5 },\n  default: { in: 3, out: 15 },\n};\n\nfunction costUsd(model, tokensIn, tokensOut) {\n  const p = PRICING[model] || PRICING.default;\n  return (tokensIn / 1e6) * p.in + (tokensOut / 1e6) * p.out;\n}\n\n/**\n * Score one config from its trial records.\n * @param {string} configId\n * @param {Array<{passed:boolean, tokensIn:number, tokensOut:number, latencyMs:number}>} trials\n * @param {{model?:string, z?:number}} opts\n */\nexport function scoreConfig(configId, trials, opts = {}) {\n  const model = opts.model || \"default\";\n  const z = opts.z ?? 1.96;\n  const n = trials.length;\n  const successes = trials.filter((t) => t.passed).length;\n  const ci = wilson(successes, n, z);\n\n  const tokensTotal = trials.map((t) => t.tokensIn + t.tokensOut);\n  const latencies = trials.map((t) => t.latencyMs);\n  const costs = trials.map((t) => costUsd(model, t.tokensIn, t.tokensOut));\n\n  return {\n    configId,\n    n,\n    successes,\n    passRate: ci.point,\n    ci: { lo: ci.lo, hi: ci.hi },\n    score: Math.round(ci.point * 100),\n    tokens: {\n      in: mean(trials.map((t) => t.tokensIn)),\n      out: mean(trials.map((t) => t.tokensOut)),\n      total: mean(tokensTotal),\n      totalSd: stddev(tokensTotal),\n    },\n    latency: {\n      p50: percentile(latencies, 50),\n      p95: percentile(latencies, 95),\n      mean: mean(latencies),\n    },\n    cost: { mean: mean(costs), total: costs.reduce((a, b) => a + b, 0) },\n  };\n}\n\n/**\n * Compare a baseline against one or more challengers. The verdict is the whole\n * point: we only crown a winner when the difference clears a significance bar.\n */\nexport function compare(scored, opts = {}) {\n  const alpha = opts.alpha ?? 0.05;\n  const ranked = [...scored].sort((a, b) => b.passRate - a.passRate);\n  const top = ranked[0];\n  const runnerUp = ranked[1];\n\n  let verdict;\n  if (!runnerUp) {\n    verdict = { kind: \"single\", winner: top.configId };\n  } else {\n    const test = twoProportionTest(\n      runnerUp.successes,\n      runnerUp.n,\n      top.successes,\n      top.n\n    );\n    const overlap = intervalsOverlap(top.ci, runnerUp.ci);\n    const significant = test.p < alpha;\n    verdict = {\n      kind: significant ? \"significant\" : \"inconclusive\",\n      winner: significant ? top.configId : null,\n      p: test.p,\n      z: test.z,\n      ciOverlap: overlap,\n      deltaPp: (top.passRate - runnerUp.passRate) * 100, // percentage points\n      tokenDeltaPct:\n        runnerUp.tokens.total === 0\n          ? 0\n          : ((top.tokens.total - runnerUp.tokens.total) / runnerUp.tokens.total) * 100,\n      latencyDeltaPct:\n        runnerUp.latency.p50 === 0\n          ? 0\n          : ((top.latency.p50 - runnerUp.latency.p50) / runnerUp.latency.p50) * 100,\n    };\n  }\n  return { ranked, verdict, alpha };\n}\n\n/**\n * Optional, opt-in composite. weights default to pass-rate-only so the headline\n * never changes unless the caller explicitly asks for trade-off weighting.\n */\nexport function efficiencyScore(s, weights = { pass: 1, cost: 0, latency: 0 }, refs = {}) {\n  const passPart = s.passRate;\n  const costPart = refs.maxCost ? 1 - s.cost.mean / refs.maxCost : 0;\n  const latPart = refs.maxLatency ? 1 - s.latency.p50 / refs.maxLatency : 0;\n  const w = weights.pass + weights.cost + weights.latency || 1;\n  return Math.round(\n    (100 * (weights.pass * passPart + weights.cost * costPart + weights.latency * latPart)) / w\n  );\n}\n","add":128,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\report\\table.mjs","name":"table.mjs","reads":0,"versions":[{"i":20,"ts":"2026-06-13T08:33:09.440Z","action":"write","lines":82,"after":"// table.mjs \u2014 terminal drawing primitives (boxes, bars, sparklines).\n// All zero-dep, all ANSI-width aware so colored cells still align.\nimport { c, rgb, visibleLen, pad } from \"../util/colors.mjs\";\n\nconst BOX = {\n  tl: \"\u256d\", tr: \"\u256e\", bl: \"\u2570\", br: \"\u256f\",\n  h: \"\u2500\", v: \"\u2502\", ml: \"\u251c\", mr: \"\u2524\", mt: \"\u252c\", mb: \"\u2534\", x: \"\u253c\",\n};\n\n/** A rounded box around pre-rendered lines, with an optional title tab. */\nexport function box(lines, { title = \"\", color = c.cyan } = {}) {\n  const width = Math.max(...lines.map(visibleLen), visibleLen(title) + 2, 10);\n  const out = [];\n  const top = title\n    ? color(BOX.tl + BOX.h + \" \") + c.bold(title) + \" \" +\n      color(BOX.h.repeat(Math.max(0, width - visibleLen(title) - 3)) + BOX.tr)\n    : color(BOX.tl + BOX.h.repeat(width + 2) + BOX.tr);\n  out.push(top);\n  for (const line of lines) {\n    out.push(color(BOX.v) + \" \" + pad(line, width) + \" \" + color(BOX.v));\n  }\n  out.push(color(BOX.bl + BOX.h.repeat(width + 2) + BOX.br));\n  return out.join(\"\\n\");\n}\n\n/** Horizontal bar, optionally with a faint confidence-interval whisker. */\nexport function bar(value, max, width = 24, { color, ci } = {}) {\n  const frac = max > 0 ? value / max : 0;\n  const filled = Math.round(frac * width);\n  const tone = color || gradient(frac);\n  let cells = [];\n  for (let i = 0; i < width; i++) {\n    if (i < filled) cells.push(tone(\"\u2588\"));\n    else cells.push(c.gray(\"\u2591\"));\n  }\n  if (ci && max > 0) {\n    const lo = Math.round((ci.lo / max) * width);\n    const hi = Math.min(width - 1, Math.round((ci.hi / max) * width));\n    if (cells[lo]) cells[lo] = c.white(\"\ufffdmisc\");\n    // mark CI bounds with brackets without breaking width\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }\n  return cells.join(\"\");\n}\n\n/** Unicode sparkline from a numeric series. */\nexport function sparkline(xs) {\n  if (xs.length === 0) return \"\";\n  const ticks = \"\u2581\u2582\u2583\u2584\u2585\u2586\u2587\u2588\";\n  const min = Math.min(...xs);\n  const max = Math.max(...xs);\n  const span = max - min || 1;\n  return xs\n    .map((x) => ticks[Math.min(ticks.length - 1, Math.floor(((x - min) / span) * (ticks.length - 1)))])\n    .join(\"\");\n}\n\n/** Color ramp red\u2192yellow\u2192green for a fraction in [0,1]. */\nexport function gradient(frac) {\n  const f = Math.max(0, Math.min(1, frac));\n  let r, g;\n  if (f < 0.5) { r = 235; g = Math.round(80 + f * 2 * 175); }\n  else { r = Math.round(235 - (f - 0.5) * 2 * 175); g = 235; }\n  return (s) => rgb(r, g, 90, s);\n}\n\n/** Simple aligned column layout. rows = array of arrays of (possibly colored) cells. */\nexport function columns(rows, { align = [], gap = 2 } = {}) {\n  const widths = [];\n  for (const row of rows) {\n    row.forEach((cell, i) => {\n      widths[i] = Math.max(widths[i] || 0, visibleLen(String(cell)));\n    });\n  }\n  return rows\n    .map((row) =>\n      row.map((cell, i) => pad(String(cell), widths[i], align[i] || \"left\")).join(\" \".repeat(gap))\n    )\n    .join(\"\\n\");\n}\n","add":82,"del":0},{"i":23,"ts":"2026-06-13T08:33:15.893Z","action":"edit","before":"  if (ci && max > 0) {\n    const lo = Math.round((ci.lo / max) * width);\n    const hi = Math.min(width - 1, Math.round((ci.hi / max) * width));\n    if (cells[lo]) cells[lo] = c.white(\"\ufffdmisc\");\n    // mark CI bounds with brackets without breaking width\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }","after":"  if (ci && max > 0) {\n    // Overlay the confidence interval as bracket markers, keeping bar width fixed.\n    const lo = Math.max(0, Math.min(width - 1, Math.round((ci.lo / max) * width)));\n    const hi = Math.max(0, Math.min(width - 1, Math.round((ci.hi / max) * width)));\n    cells[lo] = c.bold(c.white(\"[\"));\n    cells[hi] = c.bold(c.white(\"]\"));\n  }","diff":[{"t":"@","s":"@@ -1,7 +1,6 @@"},{"t":" ","s":"  if (ci && max > 0) {"},{"t":"-","s":"    const lo = Math.round((ci.lo / max) * width);"},{"t":"-","s":"    const hi = Math.min(width - 1, Math.round((ci.hi / max) * width));"},{"t":"-","s":"    if (cells[lo]) cells[lo] = c.white(\"\ufffdmisc\");"},{"t":"-","s":"    // mark CI bounds with brackets without breaking width"},{"t":"+","s":"    // Overlay the confidence interval as bracket markers, keeping bar width fixed."},{"t":"+","s":"    const lo = Math.max(0, Math.min(width - 1, Math.round((ci.lo / max) * width)));"},{"t":"+","s":"    const hi = Math.max(0, Math.min(width - 1, Math.round((ci.hi / max) * width)));"},{"t":" ","s":"    cells[lo] = c.bold(c.white(\"[\"));"},{"t":" ","s":"    cells[hi] = c.bold(c.white(\"]\"));"}],"add":3,"del":4},{"i":72, verdict } = result;\n  const lines = [];\n\n  // \u2500\u2500 header \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const header =\n    c.bold(c.cyan(LOGO)) +\n    c.gray(\"  \u00b7  \") +\n    `suite ${c.bold(meta.suite)}` +\n    c.gray(\"  \u00b7  \") +\n    `model ${c.bold(meta.model)}` +\n    c.gray(\"  \u00b7  \") +\n    `trials ${c.bold(meta.trialsPerConfig)}\u00d7${ranked.length}`;\n  lines.push(\"\", header, \"\");\n\n  // \u2500\u2500 results table \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const rows = [\n    [\n      c.gray(\"  \"),\n      c.bold(c.gray(\"CONFIG\")),\n      c.bold(c.gray(\"SCORE\")),\n      c.bold(c.gray(\"PASS RATE  (95% CI)\")),\n      c.bold(c.gray(\"TOKENS\")),\n      c.bold(c.gray(\"LATENCY\")),\n      c.bold(c.gray(\"COST\")),\n    ],\n  ];\n  ranked.forEach((s, i) => {\n    const medal = i === 0 ? c.yellow(\"\u25cf\") : c.gray(\"\u25cb\");\n    const tone = gradient(s.passRate);\n    const ciStr = `${fmtPct(s.passRate)} ${c.gray(fmtPct(s.ci.lo) + \"\u2013\" + fmtPct(s.ci.hi))}`;\n    rows.push([\n      medal,\n      i === 0 ? c.bold(s.configId) : s.configId,\n      tone(c.bold(String(s.score).padStart(3))),\n      bar(s.passRate, 1, 14, { ci: s.ci }) + \" \" + ciStr,\n      fmtTokens(s.tokens.total),\n      fmtMs(s.latency.p50),\n      \"$\" + s.cost.mean.toFixed(4),\n    ]);\n  });\n  const table = columns(rows, { align: [\"left\", \"left\", \"right\", \"left\", \"right\", \"right\", \"right\"], gap: 2 });\n  lines.push(box(table.split(\"\\n\"), { title: \"RESULTS\", color: c.cyan }));\n  lines.push(\"\");\n\n  // \u2500\u2500 verdict \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  if (verdict.kind === \"single\") {\n    lines.push(c.bold(\"  VERDICT  \") + `only one config \u2014 nothing to compare`);\n  } else if (verdict.kind === \"significant\") {\n    const sigBadge = c.bgGreen(c.bold(\" SIGNIFICANT \"));\n    lines.push(\n      c.bold(\"  VERDICT  \") +\n        c.green(c.bold(verdict.winner)) +\n        \" wins  \" +\n        sigBadge +\n        \"  \" +\n        c.gray(`p=${verdict.p.toFixed(3)}`)\n    );\n    lines.push(\n      \"           \" +\n        c.green(sign(verdict.deltaPp, \"pp\")) +\n        c.gray(\" pass rate\") +\n        \"   \" +\n        toneDelta(-verdict.tokenDeltaPct, sign(verdict.tokenDeltaPct, \"%\") + c.gray(\" tokens\")) +\n        \"   \" +\n        toneDelta(-verdict.latencyDeltaPct, sign(verdict.latencyDeltaPct, \"%\") + c.gray(\" latency\"))\n    );\n  } else {\n    const badge = c.bgRed(c.bold(\" INCONCLUSIVE \"));\n    lines.push(\n      c.bold(\"  VERDICT  \") +\n        badge +\n        \"  \" +\n        c.yellow(\"no statistically significant winner\") +\n        c.gray(`  (\u0394 ${sign(verdict.deltaPp, \"pp\")}, p=${verdict.p.toFixed(3)})`)\n    );\n    lines.push(\n      \"           \" +\n        c.gray(\"confidence intervals overlap \u2014 run more trials or accept they tie\")\n    );\n  }\n  lines.push(\"\");\n\n  // \u2500\u2500 reproducibility footer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  lines.push(\n    c.gray(\"  reproduce  \") +\n      c.cyan(`npx claudebench replay ${meta.runId}`) +\n      c.gray(`     suite ${meta.suiteHash}`)\n  );\n  lines.push(\"\");\n  return lines.join(\"\\n\");\n}\n\nfunction toneDelta(goodness, text) {\n  // goodness > 0 means the change is favourable (e.g. fewer tokens)\n  if (goodness > 0) return c.green(text);\n  if (goodness < 0) return c.red(text);\n  return c.gray(text);\n}\n\n/** Compact per-config card used by `claudebench run` (single config, no compare). */\nexport function renderSingleCard(s, meta) {\n  const tone = gradient(s.passRate);\n  const lines = [\n    c.bold(s.configId),\n    \"\",\n    tone(c.bold(`  score ${s.score}`)) + c.gray(`  (pass ${fmtPct(s.passRate)}, 95% CI ${fmtPct(s.ci.lo)}\u2013${fmtPct(s.ci.hi)})`),\n    bar(s.passRate, 1, 28, { ci: s.ci }),\n    \"\",\n    columns(\n      [\n        [c.gray(\"tokens\"), fmtTokens(s.tokens.total) + c.gray(` (\u00b1${fmtTokens(s.tokens.totalSd)})`)],\n        [c.gray(\"latency\"), `p50 ${fmtMs(s.latency.p50)}  p95 ${fmtMs(s.latency.p95)}`],\n        [c.gray(\"cost\"), \"$\" + s.cost.mean.toFixed(4) + c.gray(\"/task\")],\n        [c.gray(\"trials\"), `${s.successes}/${s.n} passed`],\n      ],\n      { align: [\"left\", \"left\"], gap: 3 }\n    ),\n  ];\n  return box(lines, { title: `${LOGO}  \u00b7  ${meta.suite}`, color: c.cyan });\n}\n","add":148,"del":0},{"i":119,"ts":"2026-06-13T08:50:06.604Z","action":"edit","before":"    bar(s.passRate, 1, 28, { ci: s.ci }),\n    \"\",\n    columns(\n      [\n        [c.gray(\"tokens\"), fmtTokens(s.tokens.total) + c.gray(` (\u00b1${fmtTokens(s.tokens.totalSd)})`)],\n        [c.gray(\"latency\"), `p50 ${fmtMs(s.latency.p50)}  p95 ${fmtMs(s.latency.p95)}`],\n        [c.gray(\"cost\"), \"$\" + s.cost.mean.toFixed(4) + c.gray(\"/task\")],\n  writing one more file in this folder.\nimport { spawn } from \"node:child_process\";\n\n/**\n * Run one task attempt in a prepared workspace.\n * @param {object} task   { id, prompt }\n * @param {object} opts   { cwd, model, bin, timeoutMs }\n * @returns {Promise<{text:string, tokensIn:number, tokensOut:number, latencyMs:number, costUsd:number, raw:object}>}\n */\nexport async function runClaudeCode(task, opts = {}) {\n  const bin = opts.bin || process.env.CLAUDEBENCH_CLAUDE_BIN || \"claude\";\n  const args = [\"-p\", task.prompt, \"--output-format\", \"json\"];\n  if (opts.model) args.push(\"--model\", opts.model);\n\n  const start = Date.now();\n  const { stdout } = await exec(bin, args, { cwd: opts.cwd, timeoutMs: opts.timeoutMs ?? 600000 });\n  const latencyMs = Date.now() - start;\n\n  let raw = {};\n  try {\n    raw = JSON.parse(stdout);\n  } catch {\n    raw = { result: stdout };\n  }\n  // Claude Code's JSON output exposes usage under `usage`; fall back gracefully.\n  const usage = raw.usage || raw.message?.usage || {};\n  return {\n    text: raw.result ?? raw.text ?? \"\",\n    tokensIn: usage.input_tokens ?? 0,\n    tokensOut: usage.output_tokens ?? 0,\n    latencyMs: raw.duration_ms ?? latencyMs,\n    costUsd: raw.total_cost_usd ?? 0,\n    raw,\n  };\n}\n\nfunction exec(cmd, args, { cwd, timeoutMs }) {\n  return new Promise((resolve, reject) => {\n    const child = spawn(cmd, args, { cwd, shell: process.platform === \"win32\" });\n    let stdout = \"\";\n    let stderr = \"\";\n    const timer = setTimeout(() => {\n      child.kill(\"SIGKILL\");\n      reject(new Error(`adapter timeout after ${timeoutMs}ms`));\n    }, timeoutMs);\n    child.stdout.on(\"data\", (d) => (stdout += d));\n    child.stderr.on(\"data\", (d) => (stderr += d));\n    child.on(\"error\", (e) => {\n      clearTimeout(timer);\n      reject(e);\n    });\n    child.on(\"close\", (code) => {\n      clearTimeout(timer);\n      if (code !== 0 && !stdout) reject(new Error(`claude exited ${code}: ${stderr.slice(0, 400)}`));\n      else resolve({ stdout, stderr, code });\n    });\n  });\n}\n","add":64,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\engine\\grader.mjs","name":"grader.mjs","reads":0,"versions":[{"i":31,"ts":"2026-06-13T08:34:16.960Z","action":"write","lines":41,"after":"// grader.mjs \u2014 objective, test-based grading. No LLM judges.\n//\n// A task passes iff its declared test command exits 0 in the workspace after\n// the agent has run. That is the entire definition. It is auditable (you can\n// run the same command), deterministic given the agent's output, and immune to\n// the \"LLM grades LLM\" circularity that quietly wrecks most eval setups.\nimport { spawn } from \"node:child_process\";\n\n/**\n * @param {object} task  { id, test: { cmd, cwd? } }\n * @param {object} opts  { cwd, timeoutMs }\n * @returns {Promise<{passed:boolean, code:number, stdout:string, stderr:string}>}\n */\nexport async function gradeTask(task, opts = {}) {\n  if (!task.test || !task.test.cmd) {\n    throw new Error(`task ${task.id} has no test.cmd \u2014 every task must be objectively gradable`);\n  }\n  const cwd = task.test.cwd ? `${opts.cwd}/${task.test.cwd}` : opts.cwd;\n  const result = await exec(task.test.cmd, { cwd, timeoutMs: opts.timeoutMs ?? 120000 });\n  return { passed: result.code === 0, ...result };\n}\n\nfunction exec(cmd, { cwd, timeoutMs }) {\n  return new Promise((resolve) => {\n    const child = spawn(cmd, { cwd, shell: true });\n    let stdout = \"\";\n    let stderr = \"\";\n    const timer = setTimeout(() => child.kill(\"SIGKILL\"), timeoutMs);\n    child.stdout.on(\"data\", (d) => (stdout += d));\n    child.stderr.on(\"data\", (d) => (stderr += d));\n    child.on(\"error\", (e) => {\n      clearTimeout(timer);\n      resolve({ code: 1, stdout, stderr: String(e) });\n    });\n    child.on(\"close\", (code) => {\n      clearTimeout(timer);\n      resolve({ code: code ?? 1, stdout, stderr });\n    });\n  });\n}\n","add":41,"del":0}]},{"path":"D:\\assets\\claudebench\\src\\engine\\runner.mjs","name":"runner.mjs","reads":0,"versions":[{"i":33,"ts":"2026-06-13T08:34:40.195Z","action":"write","lines":121,"after":"// runner.mjs \u2014 orchestrates a benchmark run and produces a reproducible artifact.\n//\n// Two execution modes share one output format (the run artifact), which is the\n// key to reproducibility:\n//\n//   live    actually run the agent on every (config \u00d7 task \u00d7 trial) and record\n//           the raw transcript + usage into the artifact.\n//   replay  reconstruct the exact same trial records from a saved artifact /\n//           fixture, so scoring is bit-for-bit reproducible with zero cost and\n//           no API key. The demo, the tests and CI all use replay.\nimport { mkdtemp, mkdir, writeFile, cp, readFile, rm } from \"node:fs/promises\";\nimport { tmpdir } from \"node:os\";\nimport { join } from \"node:path\";\nimport { runClaudeCode } from \"../adapters/claude-code.mjs\";\nimport { gradeTask } from \"./grader.mjs\";\nimport { shortHash, hashJson } from \"../util/hash.mjs\";\n\n/**\n * @param {object} suite  loaded suite: { id, configs:[{id,content,files?}], tasks:[{id,prompt,test,files?}] }\n * @param {object} opts   { mode:'live'|'replay', trials, model, fixture, onProgress }\n * @returns {Promise<object>} run artifact\n */\nexport async function runSuite(suite, opts = {}) {\n  const mode = opts.mode || \"replay\";\n  const trials = opts.trials ?? 20;\n  const model = opts.model || \"claude-opus-4-8\";\n  const runId = `run-${shortHash({ suite: suite.id, t: Date.now(), n: trials })}`;\n  const suiteHash = shortHash({\n    configs: suite.configs.map((c) => ({ id: c.id, content: c.content })),\n    tasks: suite.tasks.map((t) => ({ id: t.id, prompt: t.prompt, test: t.test })),\n  });\n\n  let records;\n  if (mode === \"replay\") {\n    records = await replay(suite, opts.fixture);\n  } else {\n    records = await live(suite, { trials, model, onProgress: opts.onProgress });\n  }\n\n  return {\n    runId,\n    suite: suite.id,\n    suiteHash,\n    model,\n    mode,\n    createdAt: new Date().toISOString(),\n    trialsPerConfig: countTrialsPerConfig(records),\n    records, // every (config,task,trial) outcome \u2014 the audit trail\n    recordsHash: hashJson(records.map((r) => ({ c: r.config, t: r.task, k: r.trial, p: r.passed }))),\n  };\n}\n\nfunction countTrialsPerConfig(records) {\n  const byConfig = new Map();\n  for (const r of records) byConfig.set(r.config, (byConfig.get(r.config) || 0) + 1);\n  return Math.max(...byConfig.values(), 0);\n}\n\n// \u2500\u2500 replay \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nasync function replay(suite, fixture) {\n  if (!fixture) throw new Error(\"replay mode needs a fixture/artifact\");\n  const data = typeof fixture === \"string\" ? JSON.parse(await readFile(fixture, \"utf8\")) : fixture;\n  const records = data.records || data;\n  // Validate the fixture matches the suite so a stale replay can't silently lie.\n  const configIds = new Set(suite.configs.map((c) => c.id));\n  for (const r of records) {\n    if (!configIds.has(r.config)) {\n      throw new Error(`fixture references unknown config \"${r.config}\" \u2014 suite/fixture mismatch`);\n    }\n  }\n  return records;\n}\n\n// \u2500\u2500 live \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nasync function live(suite, { trials, model, onProgress }) {\n  const records = [];\n  const total = suite.configs.length * suite.tasks.length * trials;\n  let done = 0;\n  for (const config of suite.configs) {\n    for (const task of suite.tasks) {\n      for (let k = 0; k < trials; k++) {\n        const ws = await prepareWorkspace(suite, config, task);\n        try {\n          const run = await runClaudeCode(task, { cwd: ws, model });\n          const grade = await gradeTask(task, { cwd: ws });\n          records.push({\n            config: config.id,\n            task: task.id,\n            trial: k,\n            passed: grade.passed,\n            tokensIn: run.tokensIn,\n            tokensOut: run.tokensOut,\n            latencyMs: run.latencyMs,\n          });\n        } finally {\n          await rm(ws, { recursive: true, force: true });\n          onProgress?.(++done, total);\n        }\n      }\n    }\n  }\n  return records;\n}\n\nasync function prepareWorkspace(suite, config, task) {\n  const ws = await mkdtemp(join(tmpdir(), \"cbench-\"));\n  // The config under test IS the CLAUDE.md (or whatever file the config names).\n  await writeFile(join(ws, config.target || \"CLAUDE.md\"), config.content || \"\", \"utf8\");\n  if (task.fixtureDir) {\n    await cp(task.fixtureDir, ws, { recursive: true });\n  }\n  if (task.files) {\n    for (const [rel, content] of Object.entries(task.files)) {\n      const dest = join(ws, rel);\n      await mkdir(join(dest, \"..\"), { recursive: true });\n      await writeFile(dest, content, \"utf8\");\n    }\n  }\n  return ws;\n}\n","add":121,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\configs\\verbose.md","name":"verbose.md","reads":0,"versions":[{"i":36,"ts":"2026-06-13T08:35:05.497Z","action":"write","lines":33,"after":"# Project Instructions\n\n## About this project\nThis is a JavaScript project. We care a lot about code quality and we want to\nmake sure that everything is done to a very high standard at all times. Please\ntake your time and think carefully about every change that you make.\n\n## General guidance\nWhen you are working on a task, please make sure that you fully understand the\nrequirements before you begin. Read the surrounding code carefully so that you\nunderstand the existing patterns and conventions. Try to match the style of the\nexisting code as closely as you possibly can. If you are unsure about anything,\nit is always better to ask than to guess.\n\n## Coding standards\n- Please write clean, readable, well-structured code.\n- Please add comments where appropriate to explain what the code is doing.\n- Please make sure that variable names are descriptive and meaningful.\n- Please avoid introducing unnecessary complexity into the codebase.\n- Please follow the existing conventions that you find in the project.\n- Please make sure that your code is correct and handles edge cases.\n\n## Testing\nWe have a strong testing culture on this project and we would really appreciate\nit if you could make sure that all of the tests pass before you consider a task\nto be complete. The tests can be run with the standard test command. Please do\nnot skip the tests, as they are very important to us.\n\n## Final notes\nThank you so much for your help with this project. We really value your\ncontributions and we are grateful for the care and attention that you bring to\nyour work. Please always do your best.\n","add":33,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\configs\\terse.md","name":"terse.md","reads":0,"versions":[{"i":38,"ts":"2026-06-13T08:35:09.792Z","action":"write","lines":7,"after":"# Rules\n\n- JavaScript project. Match existing style.\n- Make tests pass before finishing. Run: `node --test`.\n- Handle edge cases. Keep changes minimal.\n- No new dependencies without reason.\n","add":7,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\suite.json","name":"suite.json","reads":0,"versions":[{"i":40,"ts":"2026-06-13T08:35:24.151Z","action":"write","lines":44,"after":"{\n  \"id\": \"claude-md\",\n  \"title\": \"CLAUDE.md: terse rules vs verbose prose\",\n  \"description\": \"Does a long, polite CLAUDE.md beat a short, imperative one? Same tasks, same model, measured.\",\n  \"model\": \"claude-opus-4-8\",\n  \"configs\": [\n    {\n      \"id\": \"verbose-rules\",\n      \"target\": \"CLAUDE.md\",\n      \"file\": \"configs/verbose.md\",\n      \"label\": \"Verbose, polite prose (~280 words)\"\n    },\n    {\n      \"id\": \"terse-rules\",\n      \"target\": \"CLAUDE.md\",\n      \"file\": \"configs/terse.md\",\n      \"label\": \"Terse imperative rules (~40 words)\"\n    }\n  ],\n  \"tasks\": [\n    {\n      \"id\": \"fix-off-by-one\",\n      \"kind\": \"bugfix\",\n      \"prompt\": \"The function `lastChunk(arr, size)` in chunk.js should return the final chunk of `arr` of length `size` (or the remainder if shorter). It has a bug. Fix it so the tests pass. Run the tests with `node --test`.\",\n      \"filesDir\": \"tasks/fix-off-by-one\",\n      \"test\": { \"cmd\": \"node --test\" }\n    },\n    {\n      \"id\": \"implement-parse-range\",\n      \"kind\": \"feature\",\n      \"prompt\": \"Implement `parseRange(header)` in range.js. It parses an HTTP Range header like `bytes=0-499` and returns `{ start, end }` as numbers, or `null` if malformed. Make the tests pass with `node --test`.\",\n      \"filesDir\": \"tasks/implement-parse-range\",\n      \"test\": { \"cmd\": \"node --test\" }\n    },\n    {\n      \"id\": \"refactor-dedupe\",\n      \"kind\": \"refactor\",\n      \"prompt\": \"`dedupe(items)` in dedupe.js works but is O(n^2) and mutates its input. Refactor it to be O(n) and pure, preserving first-seen order. Keep all tests passing via `node --test`.\",\n      \"filesDir\": \"tasks/refactor-dedupe\",\n      \"test\": { \"cmd\": \"node --test\" }\n    }\n  ]\n}\n","add":44,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\tasks\\fix-off-by-one\\chunk.js","name":"chunk.js","reads":0,"versions":[{"i":43,"ts":"2026-06-13T08:35:31.275Z","action":"write","lines":6,"after":"// BUG: off-by-one in the start index \u2014 returns one element too many / wrong slice.\nexport function lastChunk(arr, size) {\n  const start = arr.length - size - 1; // <-- bug here\n  return arr.slice(start);\n}\n","add":6,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\tasks\\fix-off-by-one\\chunk.test.js","name":"chunk.test.js","reads":0,"versions":[{"i":45,"ts":"2026-06-13T08:35:36.051Z","action":"write","lines":14,"after":"import { test } from \"node:test\";\nimport assert from \"node:assert/strict\";\nimport { lastChunk } from \"./chunk.js\";\n\ntest(\"returns final full chunk\", () => {\n  assert.deepEqual(lastChunk([1, 2, 3, 4, 5, 6], 2), [5, 6]);\n});\ntest(\"returns remainder when shorter than size\", () => {\n  assert.deepEqual(lastChunk([1, 2, 3], 2), [3]);\n});\ntest(\"returns whole array when size exceeds length\", () => {\n  assert.deepEqual(lastChunk([1, 2], 5), [1, 2]);\n});\n","add":14,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\tasks\\implement-parse-range\\range.js","name":"range.js","reads":0,"versions":[{"i":47,"ts":"2026-06-13T08:35:38.641Z","action":"write","lines":5,"after":"// TODO: implement parseRange per the tests.\nexport function parseRange(header) {\n  return null;\n}\n","add":5,"del":0}]},{"path":"D:\\assets\\claudebench\\suites\\claude-md\\tasks\\implement-parse-range\\range.test.js","name":"range.test.js","reads":0,"versions":[{"i":49,"ts":"2026-06-13T08:35:43.177Z","action":"write","lines":17,"after":"import { test } from \"node:test\";\nimport assert from \"node:assert/strict\";\nimport { parseRange } from \"./range.js\";\n\ntest(\"parses a normal range\", () => {\n  assert.deepEqual(parseRange(\"bytes=0-499\"), { start: 0, end: 499 });\n});\ntest(\"parses single-byte range\", () => {\n  assert.deepEqual(parseRange(\"bytes=10-10\"), { start: 10, end: 10 });\n});\n = dirname(resolve(suitePath));\n\n  const configs = await Promise.all(\n    raw.configs.map(async (cfg) => ({\n      ...cfg,\n      content: cfg.content ?? (cfg.file ? await readFile(resolve(baseDir, cfg.file), \"utf8\") : \"\"),\n    }))\n  );\n\n  const tasks = raw.tasks.map((task) => ({\n    ...task,\n    fixtureDir: task.filesDir ? resolve(baseDir, task.filesDir) : undefined,\n  }));\n\n  return { ...raw, configs, tasks, baseDir };\n}\n\n/** Resolve a suite name to its suite.json path (built-in or filesystem). */\nexport function resolveSuitePath(nameOrPath, builtinsDir) {\n  if (nameOrPath.endsWith(\".json\")) return resolve(nameOrPath);\n  if (isAbsolute(nameOrPath)) return resolve(nameOrPath, \"suite.json\");\n  return resolve(builtinsDir, nameOrPath, \"suite.json\");\n}\n","add":31,"del":0}]},{"path":"D:\\assets\\claudebench\\scripts\\gen-fixture.mjs","name":"gen-fixture.mjs","reads":0,"versions":[{"i":58,"ts":"2026-06-13T08:36:16.909Z","action":"write","lines":83,"after":"// gen-fixture.mjs \u2014 produce a deterministic demo fixture.\n//\n// This is a DEV tool, not part of the runtime. It samples plausible trial\n// outcomes from fixed \"true\" pass probabilities so `claudebench demo` always\n// shows the same scorecard with no API calls. Re-run to regenerate:\n//\n//   node scripts/gen-fixture.mjs\n//\n// Real fixtures are produced by `claudebench run --live --save`; this seeded\n// generator only exists so the repo demos out-of-the-box and CI stays free.\nimport { writeFile } from \"node:fs/promises\";\nimport { resolve, dirname } from \"node:path\";\nimport { fileURLToPath } from \"node:url\";\n\nconst __dirname = dirname(fileURLToPath(import.meta.url));\n\n// Deterministic PRNG (mulberry32) so the fixture is byte-stable across machines.\nfunction mulberry32(seed) {\n  return function () {\n    seed |= 0;\n    seed = (seed + 0x6d2b79f5) | 0;\n    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);\n    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n rt.ok(tie.p > 0.05, \"50% vs 52% should not be significant\");\n});\n\ntest(\"mean/stddev/percentile basics\", () => {\n  assert.equal(mean([2, 4, 6]), 4);\n  assert.ok(Math.abs(stddev([2, 4, 6]) - 2) < 1e-9);\n  assert.equal(percentile([1, 2, 3, 4], 50), 2.5);\n});\n\n// \u2500\u2500 scoring \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction trials(passRate, n, tokens = 10000) {\n  return Array.from({ length: n }, (_, i) => ({\n    passed: i < Math.round(passRate * n),\n    tokensIn: tokens * 0.8,\n    tokensOut: tokens * 0.2,\n    latencyMs: 8000,\n  }));\n}\n\ntest(\"scoreConfig produces a 0-100 score equal to rounded pass rate\", () => {\n  const s = scoreConfig(\"x\", trials(0.84, 100));\n  assert.equal(s.score, 84);\n  assert.equal(s.n, 100);\n  assert.equal(s.successes, 84);\n});\n\ntest(\"compare crowns a winner only when the gap is significant\", () => {\n  const a = scoreConfig(\"A\", trials(0.6, 90));\n  const b = scoreConfig(\"B\", trials(0.85, 90));\n  const { verdict } = compare([a, b]);\n  assert.equal(verdict.kind, \"significant\");\n  assert.equal(verdict.winner, \"B\");\n});\n\ntest(\"compare returns inconclusive on a near tie\", () => {\n  const a = scoreConfig(\"A\", trials(0.7, 50));\n  const b = scoreConfig(\"B\", trials(0.74, 50));\n  const { verdict } = compare([a, b]);\n  assert.equal(verdict.kind, \"inconclusive\");\n  assert.equal(verdict.winner, null);\n});\n","add":78,"del":0}]},{"path":"D:\\assets\\claudebench\\package.json","name":"package.json","reads":0,"versions":[{"i":97,"ts":"2026-06-13T08:41:04.804Z","action":"write","lines":47,"after":"{\n  \"name\": \"claudebench\",\n  \"version\": \"0.1.0\
