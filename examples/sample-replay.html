, twoProportionTest } from \"./engine/stats.mjs\";\nexport { renderScorecard, renderSingleCard } from \"./report/scorecard.mjs\";\nexport { renderSvg } from \"./report/svg.mjs\";\n","add":10,"del":0}]},{"path":"D:\\assets\\claudebench\\README.md","name":"README.md","reads":0,"versions":[{"i":102,"ts":"2026-06-13T08:42:09.409Z","action":"write","lines":221,"after":"<div align=\"center\">\n\n# \u2b21 ClaudeBench\n\n### Stop arguing about prompts. Measure them.\n\nA reproducible benchmark harness for **Claude Code** workflows \u2014 prompts, `CLAUDE.md` files,\nmemory strategies, MCP stacks. Run the same tasks under each setup, get a score with a\n**confidence interval**, and find out whether the difference is real or just noise.\n\n[![tests](https://img.shields.io/badge/tests-passing-3fb950)](#)\n[![node](https://img.shields.io/badge/node-%E2%89%A518-58a6ff)](#)\n[![license](https://img.shields.io/badge/license-MIT-blue)](#)\n[![deps](https://img.shields.io/badge/runtime%20deps-0-3fb950)](#)\n\n<\/div>\n\n---\n\n> *\"This CLAUDE.md is better.\"*\n> *\"This prompt saves tokens.\"*\n> *\"This memory setup works best.\"*\n>\n> Cool. **Show the ClaudeBench results.**\n\nThe Claude Code ecosystem runs on confident claims and zero evidence. ClaudeBench turns\n\"I think it's better\" into \"it's **+24pp** better, **p<0.001**, here's the run you can replay.\"\n\n---\n\n## 60-second demo \u2014 no API key needed\n\n```bash\nnpx claudebench demo\n```\n\n```\n\u2b21 ClaudeBench  \u00b7  suite claude-md  \u00b7  model claude-opus-4-8  \u00b7  trials 90\u00d72\n\n\u256d\u2500 RESULTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256e\n\u2502     CONFIG         SCORE  PASS RATE  (95% CI)         TOKENS  LATENCY     COST   \u2502\n\u2502 \u25cf   terse-rules       88  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2591] 88% 79%\u201393%    7.8k     7.7s  $0.2177   \u2502\n\u2502 \u25cb   verbose-rules     63  \u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2588\u2591]\u2591\u2591\u2591 63% 53%\u201373%   12.4k     9.0s  $0.3048   \u2502\n\u2570\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256f\n\n  VERDICT  terse-rules wins   SIGNIFICANT   p=0.000\n           +24.4pp pass rate   -37.0% tokens   -15.4% latency\n\n  reproduce  npx claudebench replay run-d1de24eb7f00     suite 4fca3b6c8589\n```\n\n<div align=\"center\">\n<img src=\"assets/example-claude-md.svg\" width=\"640\" alt=\"ClaudeBench comparison scorecard\">\n<\/div>\n\nThe demo ships with a **recorded fixture**, so it runs instantly, costs nothing, and shows\nthe same result on every machine. Point it at the real CLI with `--live` when you want fresh numbers.\n\n---\n\n## Why this isn't snake oil\n\nLLM output is **non-deterministic** \u2014 temperature, server-side batching, and floating-point\nnondeterminism mean the same prompt gives different results run to run. Any \"benchmark\" that\nprints a single exact score is lying to you. ClaudeBench is built around that fact instead of\nhiding it:\n\n| Principle | What it means in practice |\n|---|---|\n| \ud83c\udfb2 **Statistical, not absolute** | Every config runs **N trials**. The score is a pass rate with a **Wilson 95% confidence interval**, not a fake point number. |\n| \u2696\ufe0f **Winners must be significant** | A two-proportion test decides the verdict. If the intervals overlap, ClaudeBench says **INCONCLUSIVE** instead of crowning noise. |\n| \ud83e\uddea **Objective grading, no LLM judge** | A task passes iff its **test suite exits 0**. No model grading another model. You can re-run the exact command yourself. |\n| \ud83d\udcfc **Record / replay** | Live runs save every transcript + token count to a hashed artifact. `replay` re-scores it **bit-for-bit**, free and offline. |\n| \ud83d\udd13 **Zero black boxes** | Zero runtime dependencies. The scoring math is ~120 lines of commented, unit-tested code in [`src/engine/stats.mjs`](src/engine/stats.mjs). |\n\n> The single most important number on the scorecard isn't the score \u2014 it's the **verdict**.\n> `INCONCLUSIVE` is a feature. It's the word that ends most of these arguments honestly.\n\n---\n\n## How it works\n\n```\n   suite.json                run                 grade                score\n  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   for each   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  test  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  N\u00d7    \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n  \u2502 configs  \u2502 \u2500 config \u00d7 \u2500\u25b6\u2502 Claude   \u2502 \u2500pass\u2500\u25b6 \u2502 exit 0? \u2502 \u2500\u2500\u2500\u2500\u2500\u25b6 \u2502 pass rate\u2502\n  \u2502 tasks    \u2502   task \u00d7     \u2502 Code CLI \u2502  /fail  \u2502 (hidden \u2502 trials \u2502 + 95% CI \u2502\n  \u2502 trials   \u2502   trial      \u2502 headless \u2502         \u2502  tests) \u2502        \u2502 + tokens \u2502\n  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518              \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518         \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518        \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                  \u2502                                       \u2502\n                                  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 records \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                   saved as a replayable run artifact\n```\n\n1. **A suite** declares the configs to compare, the coding tasks, and how each task is graded.\n2. **The runner** prepares an isolated workspace per trial (the config *is* the `CLAUDE.md`),\n   runs Claude Code headlessly (`claude -p --output-format json`), then runs the task's tests.\n3. **The scorer** aggregates pass/fail across trials into a rate + interval, with token, latency\n   and cost stats alongside \u2014 never blended into the headline score.\n\n---\n\n## Commands\n\n```bash\nclaudebench demo                          # bundled comparison, no key needed\nclaudebench compare claude-md --live      # run it for real, 20 trials/task\nclaudebench compare claude-md --live --trials 50\nclaudebench run claude-md --config terse-rules   # one config, detailed card\nclaudebench replay run-d1de24eb7f00       # re-score a saved run, exact + free\nclaudebench report run-d1de24eb7f00 --svg out.svg   # shareable SVG\nclaudebench list                          # available suites\n```\n\nEvery `compare`/`run` writes a full artifact to `.claudebench/runs/<id>.json` \u2014 the audit trail\nbehind the score.\n\n---\n\n## Benchmark categories\n\nClaudeBench suites are just JSON + a grader, so any debate that ends in passing tests is benchmarkable.\n\n| Suite family | Question it settles | Status |\n|---|---|:--:|\n| **`claude-md`** | Terse rules vs verbose prose \u2014 which `CLAUDE.md` actually codes better? | \u2705 shipped |\n| **`prompt`** | Prompt A vs B vs C on identical tasks | \ud83d\udd1c v0.2 |\n| **`memory`** | none vs memory vs distilled vs generated memory | \ud83d\udd1c v0.2 |\n| **`context`** | fresh vs long vs compacted vs distilled session | \ud83d\udd1c v0.3 |\n| **`mcp`** | Does adding MCP server X help or just burn tokens? | \ud83d\udd1c v0.3 |\n| **`coding`** | bugfix / refactor / test-writing / docs task packs | \ud83d\udfe1 expanding |\n\n---\n\n## Write your own suite\n\n```jsonc\n// suites/my-suite/suite.jso","add":221,"del":0},{"i":130,"ts":"2026-06-13T08:51:07.331Z","action":"edit","before":"```\n\u2b21 ClaudeBench  \u00b7  suite claude-md  \u00b7  model claude-opus-4-8  \u00b7  trials 90\u00d72\n\n\u256d\u2500 RESULTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256e\n\u2502     CONFIG         SCORE  PASS RATE  (95% CI)         TOKENS  LATENCY     COST   \u2502\n\u2502 \u25cf   terse-rules       88  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2591] 88% 79%\u201393%    7.8k     7.7s  $0.2177   \u2502\n\u2502 \u25cb   verbose-rules     63  \u2588\u2588\u2588\u2588\u2588\u2588\u2588[\u2588\u2591]\u2591\u2591\u2591 63% 53%\u201373%   12.4k     9.0s  $0.3048   \u2502\n\u2570\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u256f"},{"t":" ","s":""},{"t":" ","s":"  VERDICT  terse-rules wins   SIGNIFICANT   p=0.000"},{"t":" ","s":"           +24.4pp pass rate   -37.0% tokens   -15.4% latency"},{"t":" ","s":""},{"t":"-","s":"  reproduce  npx claudebench replay run-d1de24eb7f00     suite 4fca3b6c8589"},{"t":"+","s":"  reproduce  npx claudebench replay run-06a65a2f8f36     suite 4fca3b6c8589"},{"t":" ","s":"```"}],"add":5,"del":5}]},{"path":"D:\\assets\\claudebench\\docs\\METHODOLOGY.md","name":"METHODOLOGY.md","reads":0,"versions":[{"i":105,"ts":"2026-06-13T08:42:41.628Z","action":"write","lines":116,"after":"# ClaudeBench Methodology\n\nThis document explains exactly how a score is produced, why each choice was made, and \u2014 just as\nimportant \u2014 **what these numbers cannot prove**. If you don't trust the method, the score is worthless.\n\n## 1. The core problem: LLMs are stochastic\n\nThe same prompt to the same model does not give the same output twice. Causes:\n\n- Sampling temperature > 0.\n- Server-side batching and kernel nondeterminism (you can get variation even at temperature 0).\n- Floating-point non-associativity across hardware.\n\n**Consequence:** any benchmark that reports a single exact number (\"score: 84\") is either running\none trial (statistically meaningless) or hiding variance. ClaudeBench refuses to do either.\n\n## 2. The unit of measurement: pass rate\n\nFor a given config, we run every task `trials` times. Each (config, task, trial) yields one\n**Bernoulli outcome**: the task's test command exited 0 (pass) or it didn't (fail).\n\nA config's score is its overall pass rate across all trials:\n\n```\nscore = round(100 \u00d7 successes / n)        where n = tasks \u00d7 trials\n```\n\nNothing else is in the headline score. See \u00a76 for why.\n\n## 3. The interval: Wilson score, 95%\n\nA pass rate of 84/100 is not \"84%\". It's \"84%, give or take\". We quantify the give-or-take with a\n**Wilson score interval** rather than the textbook normal approximation `p \u00b1 z\u00b7\u221a(p(1\u2212p)/n)`.\n\nWhy Wilson:\n\n- The normal approximation produces nonsense at the edges \u2014 bounds below 0 or above 1 \u2014 and\n  benchmark results live at the edges (\"10/10 passed!\").\n- Wilson stays inside [0, 1] and behaves well for small `n`.\n- It's the interval used by mature A/B-testing tools, so it's defensible.\n\nImplementation: [`src/engine/stats.mjs \u2192 wilson()`](../src/engine/stats.mjs), unit-tested at the\n0%, 100% and middle cases.\n\n## 4. The verdict: two-proportion significance test\n\nComparing two configs, we ask the only question that matters: **is the difference real?**\n\n- We run a **pooled two-proportion z-test** between the top config and the runner-up.\n- If `p < \u03b1` (default `\u03b1 = 0.05`), the verdict is **SIGNIFICANT** and we name a winner.\n- Otherwise the verdict is **INCONCLUSIVE** \u2014 explicitly *no winner*, with the observed gap and\n  p-value shown so you can decide whether to run more trials.\n\n`INCONCLUSIVE` is the most valuable output in the tool. It is the honest end to most \"X is better\"\narguments. We would rather report a tie than manufacture a winner.\n\nA visual sanity check (do the 95% intervals overlap?) is shown alongside the formal test.\n\n## 5. Grading: objective, test-based, no LLM judge\n\nA task passes **iff** its declared `test.cmd` exits 0 in the workspace after the agent has run.\n\nWe deliberately do **not** use an LLM to grade outputs:\n\n- An LLM judge carries the same variance and bias as the system under test (circularity).\n- Test exit codes are objective, cheap, and **independently re-runnable** by anyone auditing a run.\n\nThe cost of this rigor: ClaudeBench can only benchmark tasks reducible to a passing test. We treat\nthat as a discipline, not a limitation \u2014 if you can't write the test, you don't actually know what\n\"better\" means for that task.\n\n## 6. Why tokens/latency/cost are NOT in the score\n\nIt is tempting to blend everything into one number (e.g. `score = pass \u2212 \u03bb\u00b7tokens`). We don't,\nbecause the weighting \u03bb is an *opinion*, and burying an opinion inside a headline number is exactly\nhow benchmarks lose trust.\n\nInstead:\n\n- **Headline = pass rate.** Objective, no opinion required.\n- **Tokens, latency, cost = separate columns.** The reader applies their own trade-off.\n- An **opt-in** `efficiencyScore(weights)` exists for those who want a composite \u2014 but the weights\n  are passed in and printed, never hidden.\n\n## 7. Reproducibility model\n\nWe separate two things that are usually conflated:\n\n| | Deterministic? | How |\n|---|---|---|\n| **Generation** (model producing output) | \u274c No | Inherent to LLMs. We handle it with N trials + intervals. |\n| **Scoring** (artifact \u2192 numbers) | \u2705 Yes, bit-exact | `replay` recomputes from the saved records. |\n\nEvery live run writes an artifact containing every trial's pass/fail and token usage, plus:\n\n- `suiteHash` \u2014 content hash of all configs + tasks. Change a task, the hash changes.\n- `recordsHash` \u2014 hash of the outcome records. Tamper with results, the hash changes.\n- `model`, `createdAt`, `mode`.\n\nSo \"reproducible\" means: **re-scoring an artifact gives the identical number forever**, and\n**re-running live gives a result consistent with the stated interval**. That is the strongest\nreproducibility claim an honest LLM benchmark can make.\n\n## 8. Known limitations (read this before quoting a number)\n\n- **Task validity.** A suite only measures what its tasks measure. A `CLAUDE.md` that helps on\n  parsing tasks may not generalize. Don't over-claim from one suite.\n- **Trial budget.** Tight intervals need many trials, which cost money. Small `n` \u2192 wide intervals\n  \u2192 more `INCONCLUSIVE`. That's correct behavior, not a bug.\n- **Model drift.** Results are tied to a model version. Re-run when the model changes.\n- **Workspace leakage.** Tasks must be self-contained and hermetic, or trials aren't independent.\n- **Gaming.** A task whose tests are visible to the agent can be gamed. Keep grading robust.\n\nIf a result matters, run it live, with enough trials that the interval is tight, and publish the\nartifact. Anything less is an anecdote.\n","add":116,"del":0}]},{"path":"D:\\assets\\claudebench\\docs\\ARCHITECTURE.md","name":"ARCHITECTURE.md","reads":0,"versions":[{"i":107,"ts":"2026-06-13T08:43:04.716Z","action":"write","lines":93,"after":"# ClaudeBench Architecture\n\nZero runtime dependencies, pure Node ESM, no build step. The design goal is that a skeptic can read\nthe whole thing in an afternoon.\n\n## Module map\n\n```\nbin/claudebench.mjs        thin entrypoint \u2192 src/cli.mjs\nsrc/\n  cli.mjs                  arg parsing + command dispatch (demo/compare/run/replay/report/list)\n  index.mjs                public library API (import { runSuite, compare } from \"claudebench\")\n  engine/\n    suite.mjs              load + resolve suite.json (inline config contents, resolve task dirs)\n    runner.mjs             orchestrate live | replay \u2192 produce a run artifact\n    grader.mjs             run a task's test.cmd, pass = exit 0  (NO llm judge)\n    scorer.mjs             trials \u2192 pass rate + CI + token/latency/cost stats + verdict\n    stats.mjs              wilson(), twoProportionTest(), mean/stddev/percentile  (the trust core)\n  adapters/\n    claude-code.mjs        spawn `claude -p --output-format json`; parse usage  (only model contact)\n  report/\n    scorecard.mjs          the terminal scorecard (the screenshot)\n    table.mjs              ANSI-aware box/bar/sparkline/columns primitives\n    svg.mjs                self-contained SVG export for READMEs\n  util/\n    colors.mjs             hand-rolled ANSI, respects NO_COLOR / non-TTY\n    hash.mjs               stable-stringify + sha256 for reproducibility receipts\nsuites/<id>/               built-in benchmark suites (suite.json + configs/ + tasks/)\nfixtures/<id>.json         recorded trials so demos run free + offline + deterministic\nscripts/gen-fixture.mjs    dev-only seeded fixture generator (not shipped at runtime)\ntest/                      unit tests for stats + scoring\n```\n\n## Data flow\n\n```\nloadSuite(suite.json)\n      \u2502   { configs:[{id,content}], tasks:[{id,prompt,test,fixtureDir}] }\n      \u25bc\nrunSuite(suite, {mode})\n      \u251c\u2500 live:   for config\u00d7task\u00d7trial \u2192 prepareWorkspace \u2192 runClaudeCode \u2192 gradeTask \u2192 record\n      \u2514\u2500 replay: load fixture/artifact \u2192 validate against suite \u2192 records\n      \u25bc\n  run artifact  { runId, suiteHash, model, records[], recordsHash }   \u2500\u2500 saved to .claudebench/runs/\n      \u25bc\nscoreRun(artifact)  \u2192 scoreConfig() per config \u2192 compare()\n      \u25bc\nrenderScorecard() | renderSvg() | JSON\n```\n\n## The one extension point that matters: adapters\n\nEverything that touches a model lives in `src/adapters/`. Today there's one adapter\n(`claude-code.mjs`, the headless CLI). Supporting the Claude API directly, or a different agent, is\na single new file exposing:\n\n```js\nasync function run(task, opts) \u2192 { text, tokensIn, tokensOut, latencyMs, costUsd, raw }\n```\n\nThe runner, grader, scorer and reports are all adapter-agnostic.\n\n## Suite contract\n\nA suite is data, not code:\n\n```jsonc\n{\n  \"id\": \"string\",\n  \"title\": \"string\",\n  \"model\": \"claude-opus-4-8\",\n  \"configs\": [{ \"id\", \"target\": \"CLAUDE.md\", \"file\" | \"content\" }],\n  \"tasks\":   [{ \"id\", \"prompt\", \"filesDir\" | \"files\", \"test\": { \"cmd\", \"cwd\"? } }]\n}\n```\n\nInvariant: **every task must have a `test.cmd`**. No test, no objective grade, no place in a suite.\n\n## Why no TypeScript / build step / deps\n\n- A benchmark's credibility is inversely proportional to how much you have to trust to run it.\n- Pure `.mjs` runs on any Node \u226518 with `node bin/claudebench.mjs` \u2014 nothing to compile, nothing to\n  audit in `node_modules`.\n- The cost is no static types; we offset it with unit tests on the parts that matter (the math).\n\n## Testing strategy\n\n- `test/scorer.test.mjs` covers the statistics and scoring/verdict logic \u2014 the only places a bug\n  would silently corrupt a published number.\n- Suite *task* tests (under `suites/*/tasks/`) are **not** part of `npm test`; they are fixtures the\n  grader runs inside isolated workspaces. `npm test` is scoped to `test/**/*.test.mjs`.\n- CI runs `npm test` and `claudebench demo` (replay, free) on every push.\n","add":93,"del":0},{"i":179,"ts":"2026-06-13T08:56:23.959Z","action":"edit","before":"  grader runs inside isolated workspaces. `npm test` is scoped to `test/**/*.test.mjs`.","after":"  grader runs inside isolated workspaces. `npm test` runs the files in `test/` explicitly (not a\n  bare `node --test`, which would glob the suite task tests too); add new test files to the script.","diff":[{"t":"@","s":"@@ -1 +1,2 @@"},{"t":"-","s":"  grader runs inside isolated workspaces. `npm test` is scoped to `test/**/*.test.mjs`."},{"t":"+","s":"  grader runs inside isolated workspaces. `npm test` runs the files in `test/` explicitly (not a"},{"t":"+","s":"  bare `node --test`, which would glob the suite task tests too); add new test files to the script."}],"add":2,"del":1}]},{"path":"D:\\assets\\claudebench\\.github\\workflows\\ci.yml","name":"ci.yml","reads":0,"versions":[{"i":109,"ts":"2026-06-13T08:43:09.832Z","action":"write","lines":27,"after":"name: ci\n\ const TKCOL={read:'--read',write:'--write',edit:'--edit',exec:'--exec',search:'--search',agent:'--agent',other:'--other'};
const ICON={read:'\u{1F441}',write:'✍',edit:'✏',exec:'⚡',search:'\u{1F50D}',agent:'\u{1F916}',other:'\u{1F527}'};
const MEMOJI={prompt:'\u{1F4AC}',fix:'✅',mistake:'❌',refactor:'♻️',build:'\u{1F3D7}️',ctxjump:'\u{1F4C8}',summary:'\u{1F3C1}',system:'\u{1F5DC}'};
const $=s=>document.querySelector(s), ce=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function fmtDur(s){s=Math.round(s);let h=s/3600|0,m=(s%3600)/60|0,ss=s%60;return h?`${h}h ${m}m`:(m?`${m}m ${ss}s`:`${ss}s`);}
function cssv(v){return getComputedStyle(document.documentElement).getPropertyValue(v);}

// ---- visible events (system notes optional) ----
let showNotes=false;
function visible(){return DATA.events.filter(e=>e.kind!=='note'||showNotes);}

// ---- header / aside render ----

  const m=DATA.meta;
  $('#htitle').textContent=m.title;
  document.title=m.title+' · ClaudeReplay';
  $('#bModel').textContent=(m.model||'claude').replace('claude-','');
  $('#bWhen').textContent=m.started?m.started.slice(0,16).replace('T',' '):'';
  $('#bDur').textContent=fmtDur(m.durationSec);
}
function asideRender(){
  // moments
  const mc=$('#moments');mc.innerHTML='';
  (DATA.top.length?DATA.top:DATA.moments).slice(0,8).forEach(m=>{

    d.onclick=()=>seekToEvent(m.i);mc.appendChild(d);

    const d=ce('div','filerow');
    d.innerHTML=`<span class="fn" title="${esc(f.path)}">${esc(f.name)}</span>
      <span class="fm">${f.versions.length}× <span class="add">+${adds}</span>/<span class="del">-${dels}</span></span>`;

  if(!DATA.files.length)fc.innerHTML='<div style="color:var(--dim);font-size:12px">no file edits</div>';
  // tool mix
  const tm=$('#toolmix');tm.innerHTML='';
  const tools=Object.entries(DATA.meta.tools);const max=Math.max(1,...tools.map(t=>t[1]));
  const TK={Read:'read',NotebookRead:'read',Write:'write',NotebookEdit:'write',Edit:'edit',MultiEdit:'edit',Bash:'exec',PowerShell:'exec',Grep:'search',Glob:'search',WebSearch:'search',WebFetch:'search',Task:'agent',Agent:'agent'};
  tools.forEach(([name,n])=>{
    const k=TK[name]||'other';const r=ce('div','tmrow');
    r.innerHTML=`<span style="width:78px;color:var(--dim)">${esc(name)}</span>
      <span class="tmbar" style="width:${Math.max(8,160*n/max)}px;background:${cssv(TKCOL[k])}"></span>
      <span style="color:var(--dim)">${n}</span>`;
    tm.appendChild(r);
  });
}

// ---- context chart ----
function ctxChart(){
  const svg=$('#ctxchart');const W=288,H=88,pad=4;
  const pts=DATA.ctx.length?DATA.ctx:[{i:0,ctx:0}];
  const peak=Math.max(1,...pts.map(p=>p.ctx));
  const n=pts.length;
  const X=j=>pad+(W-2*pad)*(n<2?j:j/(n-1));
  const Y=v=>H-pad-(H-2*pad)*v/peak;
  let area=`M ${X(0)} ${H-pad}`,line='';
  pts.forEach((p,j)=>{area+=` L ${X(j).toFixed(1)} ${Y(p.ctx).toFixed(1)}`;line+=(j?'L':'M')+` ${X(j).toFixed(1)} ${Y(p.ctx).toFixed(1)} `;});
  area+=` L ${X(n-1)} ${H-pad} Z`;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=`<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="${cssv('--acc')}" stop-opacity=".55"/>
    <stop offset="1" stop-color="${cssv('--acc')}" stop-opacity=".03"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="${cssv('--acc')}" stroke-width="1.6"/>
    <line id="cxh" x1="0" y1="${pad}" x2="0" y2="${H-pad}" stroke="#fff" stroke-opacity=".55" stroke-width="1.4"/>
    <circle id="cxd" r="3" fill="#fff"/>`;
  svg._X=X;svg._Y=Y;svg._pts=pts;svg._peak=peak;
}
function ctxUpdate(evIdx){
  const svg=$('#ctxchart');if(!svg._pts)return;
  let k=0;for(let j=0;j<svg._pts.length;j++){if(svg._pts[j].i<=evIdx)k=j;}
  const p=svg._pts[k];const x=svg._X(k),y=svg._Y(p.ctx);
  const h=svg.querySelector('#cxh'),d=svg.querySelector('#cxd');
  if(h){h.setAttribute('x1',x);h.setAttribute('x2',x);} if(d){d.setAttribute('cx',x);d.setAttribute('cy',y);}
  $('#ctxlabel').textContent=`${p.ctx.toLocaleString()} tokens  ·  peak ${DATA.meta.ctxPeak.toLocaleString()}`;
}

// ---- stage (event cards) ----
function bodyText(t,clip){
  const big=t.length>600;
  return `<div class="body${clip&&big?' clip':''}">${esc(t)}</div>`+
    (clip&&big?`<div class="more" onclick="this.previousElementSibling.classList.toggle('clip');this.textContent=this.previousElementSibling.classList.contains('clip')?'… show more':'show less'">… show more</div>`:'');
}
function evCard(e){
  const wrap=ce('div','ev '+e.kind+(e.err?' err':''));wrap.id='ev'+e.i;wrap.dataset.i=e.i;
  let icCls='ic',icon='•',lab='',inner='';
  if(e.kind==='prompt'){icon='\u{1F464}';lab='YOU';inner=bodyText(e.text);}
  else if(e.kind==='command'){icCls='ic';icon='/';lab='SLASH COMMAND';inner=`<div class="tsum mono">/${esc(e.text)}</div>`;}
  else if(e.kind==='thinking'){icon='\u{1F4AD}';lab='CLAUDE · thinking';inner=bodyText(e.text,true);}
  else if(e.kind==='text'){icon='\u{1F916}';lab='CLAUDE';inner=bodyText(e.text,true);}
  else if(e.kind==='tool'){icCls='ic '+(e.tk||'other');icon=ICON[e.tk||'other'];lab='TOOL CALL';
    inner=`<div><span class="tname">${esc(e.tool)}</span> <span class="tsum">${esc(e.sum)}</span></div>`+toolInput(e);}
  else if(e.kind==='result'){icon=e.err?'✖':'✓';lab=e.err?'RESULT · error':'RESULT';
    inner=`<pre class="body clip">${esc(e.out||'')}</pre>`+
      (e.out&&e.out.length>400?`<div class="more" onclick="this.previousElementSibling.classList.toggle('clip');this.textContent=this.previousElementSibling.classList.contains('clip')?'… show more':'show less'">… show more</div>`:'')+
      (e.trunc?`<div class="trunc">… output truncated (${e.bytes.toLocaleString()} bytes total)</div>`:'')+
      (e.img?`<div class="trunc">[contains image]</div>`:'');}
  else if(e.kind==='system'){icon='\u{1F5DC}';lab='SYSTEM';inner=`<div class="tsum">${esc(e.text||'')}</div>`;}
  else if(e.kind==='note'){icon='ⓘ';lab='NOTE';inner=`<div class="tsum" style="color:var(--dim)">${esc(e.text||'')}</div>`;}
  const t=clockFor(e);
  wrap.innerHTML=`<div class="row"><div class="${icCls}">${icon}</div>
    <div class="card"><div class="lab">${lab}<span class="t">${t}</span></div>${inner}</div></div>`;
  return wrap;
}
function toolInput(e){
  if(!e.inp)return'';
  const keys=Object.keys(e.inp);if(!keys.length)return'';
  if('command' in e.inp)return`<pre class="body clip mono">${esc(e.inp.command)}</pre>`;
  if('old_string' in e.inp||'new_string' in e.inp)
    return`<pre class="body clip mono"><span style="color:var(--err)">- ${esc(e.inp.old_string||'')}</span>\n<span style="color:var(--ok)">+ ${esc(e.inp.new_string||'')}</span></pre>`;
  if('content' in e.inp)return`<pre class="body clip mono">${esc(e.inp.content)}</pre>`;
  if('pattern' in e.inp)return`<div class="tsum mono">/${esc(e.inp.pattern)}/</div>`;
  return'';
}
function clockFor(e){
  if(e.off!=null)return '+'+fmtDur(e.off);
  if(e.ts)return e.ts.slice(11,19);
  return '';
}

// offsets: compute seconds from start for each event
function computeOffsets(){
  const t0=DATA.meta.started?Date.parse(DATA.meta.started):0;
  DATA.events.forEach(e=>{e.off=(e.ts&&t0)?(Date.parse(e.ts)-t0)/1000:null;});
}

// ---- timeline track ----
function buildTrack(){
  const tr=$('#track');[...tr.querySelectorAll('.tick,.mk')].forEach(n=>n.remove());
  const vis=visible();const n=vis.length;
  vis.forEach((e,j)=>{
    let col;
    if(e.kind==='tool')col=cssv(TKCOL[e.tk||'other']);
    else if(e.kind==='result')col=e.err?cssv('--err'):cssv('--ok');
    else if(e.kind==='prompt')col=cssv('--edit');
    else if(e.kind==='text')col=cssv('--fg');
    else if(e.kind==='thinking')col=cssv('--think');
    else col=cssv('--line');
    const t=ce('div','tick');t.style.left=(100*j/Math.max(1,n-1))+'%';t.style.background=col;t.style.opacity=.7;
    tr.appendChild(t);
  });
  DATA.moments.forEach(m=>{
    const j=vis.findIndex(e=>e.i>=m.i);if(j<0)return;
    const mk=ce('div','mk');mk.style.left=(100*j/Math.max(1,n-1))+'%';mk.title=m.label;
    mk.onclick=ev=>{ev.stopPropagation();seekToEvent(m.i);};tr.appendChild(mk);
  });
}

let vis=[], pos=0, playing=false, speed=2, timer=null;
const SPEEDS=[1,2,5,20];
function setSpeed(x){speed=x;[...$('#speeds').children].forEach(b=>b.classList.toggle('on',+b.dataset.s===x));}
function render(){
  vis=visible();
  $('#stage').innerHTML='';
  vis.forEach(e=>$('#stage').appendChild(evCard(e)));
  buildTrack();
  if(pos>=vis.length)pos=vis.length-1; if(pos<0)pos=0;
  paint();
}
function paint(){
  vis.forEach((e,j)=>{
    const el=document.getElementById('ev'+e.i);if(!el)return;
    el.classList.toggle('seen',j<=pos);
    el.classList.toggle('cur',j===pos);
  });
  const cur=vis[pos];
  if(cur){
    const el=document.getElementById('ev'+cur.i);
    if(el)el.scrollIntoView({block:'center',behavior:playing?'smooth':'auto'});
    ctxUpdate(cur.i);
    $('#clock').textContent=(cur.off!=null?'+'+fmtDur(cur.off):'')+' / '+fmtDur(DATA.meta.durationSec);
  }
  $('#fill').style.width=(100*(pos+1)/Math.max(1,vis.length))+'%';
  $('#head').style.left=(100*pos/Math.max(1,vis.length-1))+'%';
  $('#counter').textContent=`${pos+1} / ${vis.length}`;
}
function step(d){pos=Math.max(0,Math.min(vis.length-1,pos+d));paint();if(pos>=vis.length-1)pause();}
function seekToEvent(i){const j=vis.findIndex(e=>e.i>=i);if(j>=0){pos=j;paint();}}
function seekFrac(f){pos=Math.max(0,Math.min(vis.length-1,Math.round(f*(vis.length-1))));paint();}

// playback timing from real gaps, clamped, scaled by speed
function gapMs(){
  const cur=vis[pos],nx=vis[pos+1];
  let g=600;
  if(cur&&nx&&cur.off!=null&&nx.off!=null)g=Math.min(2500,Math.max(220,(nx.off-cur.off)*1000));
  // thinking/text get a beat; results after tools are quick
  if(nx&&nx.kind==='thinking')g=Math.max(g,700);
  return g/speed;
}
function tick(){
  if(!playing)return;
  if(pos>=vis.length-1){pause();return;}
  step(1);
  timer=setTimeout(tick,gapMs());
}
function play(){if(pos>=vis.length-1)pos=0;playing=true;$('#pp').textContent='⏸';paint();timer=setTimeout(tick,gapMs());}
function pause(){playing=false;$('#pp').textContent='▶';clearTimeout(timer);}
function toggle(){playing?pause():play();}

// ---- file modal ----
function openFile(idx){
  const f=DATA.files[idx];
  $('#mtitle').textContent=f.path;
  const b=$('#mbody');b.innerHTML='';
  if(f.reads)b.insertAdjacentHTML('beforeend',`<div class="vh">read ${f.reads}× during session</div>`);
  f.versions.forEach((v,k)=>{
    const d=ce('div','ver');
    const head=`<div class="vh">#${k+1} · ${v.action==='write'?('wrote '+(v.lines||0)+' lines'):('edit · +'+(v.add||0)+'/-'+(v.del||0))} · <span class="add">+${v.add||0}</span>/<span class="del">-${v.del||0}</span></div>`;
    let body='';
    if(v.action==='write'){
      body=`<div class="diff">`+(v.after||'').split('\n').slice(0,200).map(l=>`<div class="dl p">${esc(l)}</div>`).join('')+`</div>`;
    }else if(v.diff&&v.diff.length){
      body=`<div class="diff">`+v.diff.map(dl=>{
        const c=dl.t==='+'?'p':dl.t==='-'?'m':dl.t==='@'?'c':'ctx';
        return `<div class="dl ${c}">${esc((dl.t==='+'?'+ ':dl.t==='-'?'- ':'  ')+dl.s)}</div>`;
      }).join('')+`</div>`;
    }
    d.innerHTML=head+body;
    const jump=ce('div','more');jump.textContent='→ jump to this change';jump.onclick=()=>{closeModal();seekToEvent(v.i);};
    d.appendChild(jump);
    b.appendChild(d);
  });
  $('#modal').classList.add('on');
}
function closeModal(){$('#modal').classList.remove('on');}

// ---- wire up ----
function speedButtons(){const c=$('#speeds');SPEEDS.forEach(x=>{const b=ce('button');b.textContent=x+'x';b.dataset.s=x;b.onclick=()=>setSpeed(x);c.appendChild(b);});setSpeed(2);}
function init(){
  if(!DATA||!DATA.events){$('#stage').innerHTML='<div class="empty">No session data.</div>';return;}
  computeOffsets();header();asideRender();ctxChart();speedButtons();render();ctxUpdate(0);
  $('#pp').onclick=toggle;$('#back').onclick=()=>{pause();step(-1);};$('#fwd').onclick=()=>{pause();step(1);};
  $('#shownotes').onchange=e=>{showNotes=e.target.checked;const keep=vis[pos]?vis[pos].i:0;render();seekToEvent(keep);asideRender();};
  $('#track').onclick=e=>{const r=e.currentTarget.getBoundingClientRect();pause();seekFrac((e.clientX-r.left)/r.width);};
  $('#modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.key===' '){e.preventDefault();toggle();}
    else if(e.key==='ArrowRight'){pause();step(1);}
    else if(e.key==='ArrowLeft'){pause();step(-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();setSpeed(SPEEDS[Math.min(SPEEDS.length-1,SPEEDS.indexOf(speed)+1)]);}
    else if(e.key==='ArrowDown'){e.preventDefault();setSpeed(SPEEDS[Math.max(0,SPEEDS.indexOf(speed)-1)]);}
    else if(e.key==='Escape')closeModal();
    else if(e.key==='Home'){pause();pos=0;paint();}
    else if(e.key==='End'){pause();pos=vis.length-1;paint();}
  });
}
init();
</script>
</body>
