name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  selftest:
    name: selftest (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run built-in test suite
        run: python claudereplay.py --selftest
      - name: Smoke-test the CLI surface
        run: |
          python claudereplay.py --version
          python claudereplay.py --help
          python claudereplay.py list --help
